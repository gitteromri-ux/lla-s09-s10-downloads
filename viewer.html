<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Courtney FRONT — Enhanced Part 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }
  .subtitle {
    color: #888;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .video-wrap {
    width: 100%;
    max-width: 1280px;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  video {
    width: 100%;
    height: auto;
    display: block;
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    background: #2563eb;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #1d4ed8; }
  .btn.secondary {
    background: #333;
  }
  .btn.secondary:hover { background: #444; }
  .unmute-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 16px 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .video-container { position: relative; }
</style>
</head>
<body>
  <h1>Courtney — FRONT, Enhanced Part 1</h1>
  <div class="subtitle">Denoise + sharpen + color enhanced · Audio bit-copied · 4K</div>

  <div class="video-wrap">
    <div class="video-container">
      <video id="player" controls autoplay playsinline preload="auto">
        <source src="https://media.githubusercontent.com/media/gitteromri-ux/lla-s09-s10-downloads/main/Courtney_FRONT_ENHANCED_part1.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
      </video>
      <div id="unmute" class="unmute-hint" style="display:none;">🔊 Click to enable sound</div>
    </div>
  </div>

  <div class="controls">
    <a class="btn" href="https://media.githubusercontent.com/media/gitteromri-ux/lla-s09-s10-downloads/main/Courtney_FRONT_ENHANCED_part1.mp4" download="Courtney_FRONT_ENHANCED_part1.mp4">
      ⬇ Download (1.6 GB)
    </a>
    <a class="btn secondary" href="https://github.com/gitteromri-ux/lla-s09-s10-downloads" target="_blank">
      View repo
    </a>
  </div>

<script>
  // Try autoplay with sound. If browser blocks, fall back to muted autoplay + click-to-unmute.
  const v = document.getElementById('player');
  const hint = document.getElementById('unmute');

  v.muted = false;
  v.volume = 1.0;
  const playPromise = v.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // Browser blocked autoplay-with-sound. Retry muted.
      v.muted = true;
      v.play().then(() => {
        hint.style.display = 'block';
      }).catch(() => {});
    });
  }

  const enableSound = () => {
    v.muted = false;
    v.volume = 1.0;
    hint.style.display = 'none';
    if (v.paused) v.play();
  };
  hint.addEventListener('click', enableSound);
  document.body.addEventListener('click', enableSound, { once: true });
</script>
</body>
</html>
