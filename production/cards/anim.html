<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{--bone:#F5F2EA;--lightblue:#7FB2E8;--teal:#63D3C1;--dim:#4a4a42}
  @font-face{font-family:'Archivo';src:url('fonts/Archivo.ttf');}
  @font-face{font-family:'Inter';src:url('fonts/Inter.ttf');}
  @font-face{font-family:'Fraunces';src:url('fonts/Fraunces.ttf');}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  .card{position:absolute;inset:0;background:#000;color:var(--bone);display:none;
        flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .card.on{display:flex}
  .cornerlogo{position:absolute;top:44px;right:56px;width:300px;opacity:0;animation:fadein .5s ease-out .1s forwards}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes wordon{from{color:var(--dim)}to{color:#fff}}
  @keyframes wordaccent{from{color:var(--dim)}to{color:var(--lightblue)}}
  .kt{font-family:'Archivo','Inter';font-weight:900;text-transform:uppercase;line-height:1.14;letter-spacing:2px;width:92%}
  .kt .w{color:var(--dim);display:inline-block;margin:0 .14em}
  .kt .w.lit{animation:wordon .3s ease-out forwards}
  .kt .w.acc{animation:wordaccent .3s ease-out forwards}
  .h-size .kt{font-size:110px}
  .v-size .kt{font-size:96px}
  .strip{font-family:'Inter';font-weight:600;font-size:34px;letter-spacing:5px;color:var(--bone);opacity:0;
         margin-top:64px;animation:fadein .6s ease-out 2.0s forwards}
  .offerbig{font-family:'Archivo','Inter';font-weight:900;font-size:230px;color:#fff;line-height:1;
            opacity:0;animation:fadein .4s ease-out 1.2s forwards}
  .offerstrike{font-family:'Archivo','Inter';font-weight:900;font-size:110px;color:var(--dim);
               text-decoration:line-through;text-decoration-color:var(--lightblue);text-decoration-thickness:7px;
               opacity:0;animation:fadein .4s ease-out .6s forwards}
  .kick{font-family:'Inter';font-weight:700;font-size:34px;letter-spacing:10px;text-transform:uppercase;
        color:var(--teal);opacity:0;animation:fadein .5s ease-out .3s forwards;margin-bottom:56px}
  .cta{font-family:'Archivo','Inter';font-weight:900;font-size:64px;letter-spacing:4px;text-transform:uppercase;
       color:#fff;border-bottom:6px solid var(--teal);padding-bottom:14px;margin-top:80px;
       opacity:0;animation:fadein .5s ease-out 1.9s forwards}
  .neon{font-family:'Inter';font-weight:800;font-size:56px;letter-spacing:6px;color:#fff;
        border:3px solid var(--teal);border-radius:999px;padding:30px 90px;margin-top:70px;
        text-shadow:0 0 16px rgba(99,211,193,.9),0 0 42px rgba(0,110,255,.6);
        box-shadow:0 0 30px rgba(99,211,193,.55), inset 0 0 22px rgba(99,211,193,.25);
        opacity:0;animation:fadein .7s ease-out 1.1s forwards, glowpulse 1.6s ease-in-out 1.8s infinite alternate}
  @keyframes glowpulse{from{box-shadow:0 0 26px rgba(99,211,193,.45)}to{box-shadow:0 0 52px rgba(99,211,193,.85)}}
  .tp{margin-top:56px;display:flex;gap:22px;align-items:center;justify-content:center;
      opacity:0;animation:fadein .8s ease-out 1.6s forwards}
  .stars{font-size:54px;color:#00B67A;text-shadow:0 0 18px rgba(0,182,122,.9)}
  .stars .half{opacity:.45}
  .tptxt{font-family:'Inter';font-weight:600;font-size:36px;color:var(--bone);opacity:.9}
  .logoimg{width:700px;max-width:85%;opacity:0;animation:fadein .8s ease-out .2s forwards}
  .foot{position:absolute;bottom:70px;left:0;right:0;font-family:'Inter';font-weight:600;font-size:28px;
        letter-spacing:4px;text-transform:uppercase;color:var(--bone);opacity:0;animation:fadein .6s ease-out 2.2s forwards}
  .foot b{color:var(--teal)}
</style>
</head>
<body>

<div class="card" id="cta1">
  <img class="cornerlogo" src="../../assets/lla-logo-transparent@2x.png">
  <div class="kt" id="k1"></div>
</div>

<div class="card" id="cta2">
  <img class="cornerlogo" src="../../assets/lla-logo-transparent@2x.png">
  <div class="kt" id="k2"></div>
  <div class="strip">EAT · SLEEP · MOVE · SUPPLEMENT · HEART · DATA</div>
</div>

<div class="card" id="cta3">
  <img class="cornerlogo" src="../../assets/lla-logo-transparent@2x.png">
  <div class="kick">20% OFF · THIS WEEK ONLY</div>
  <div style="display:flex;gap:44px;align-items:baseline">
    <div class="offerstrike">$1,500</div>
    <div class="offerbig">$1,200</div>
  </div>
  <div class="cta">Claim Your Seat</div>
  <div class="foot"><b>18 live sessions</b> · 20% off · this week only</div>
</div>

<div class="card" id="outro">
  <img class="logoimg" src="../../assets/lla-logo-transparent@2x.png">
  <div class="neon">ENROLL NOW</div>
  <div class="tp"><span class="stars">★★★★<span class="half">★</span></span><span class="tptxt">4.6 on Trustpilot</span></div>
  <div class="foot"><b>18 live sessions</b> · 20% off launch week · $1,500 → $1,200</div>
</div>

<div class="card" id="end">
  <img class="logoimg" src="../../assets/lla-logo-transparent@2x.png">
  <div class="foot" style="animation-delay:1s"><b>It's Your Life. Live It Well.</b></div>
</div>

<script>
// FA kinetic word reveal: words appear dim, light up in sequence; accents in light blue
const LINES = {
  k1: [["YOUR",0],["OWN",0],["BLUEPRINT",0],["FOR",0],["A",0],["LONGER,",1],["BETTER",1],["LIFE.",1]],
  k2: [["INCREASE",0],["YOUR",0],["LIFE",1],["TRAJECTORY.",1]]
};
const p = new URLSearchParams(location.search);
const id = p.get('card') || 'cta1';
document.getElementById(id).classList.add('on');
for (const [kid, words] of Object.entries(LINES)) {
  const el = document.getElementById(kid);
  if (!el) continue;
  words.forEach(([w, acc], idx) => {
    const s = document.createElement('span');
    s.className = 'w'; s.textContent = w;
    s.style.animationDelay = (0.45 + idx*0.22) + 's';
    setTimeout(()=>{}, 0);
    s.classList.add(acc ? 'acc' : 'lit');
    el.appendChild(s);
    if (idx === 4 && kid==='k1') el.appendChild(document.createElement('br'));
  });
}
</script>
</body>
</html>
