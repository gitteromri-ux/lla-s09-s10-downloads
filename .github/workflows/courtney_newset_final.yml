name: Courtney FINAL New Set (0717)

# FINAL v2: set 3 (emptied, deep-shadowed), Courtney + exact monologue in the
# chair, warm color-match, slow cinematic push-in, landing page card + artifact.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip python3-pip
          pip3 install --quiet "rembg[cpu]" onnxruntime pillow numpy

      - name: Decode embedded background plate
        run: |
          mkdir -p work out deliverables/qc
          echo "$PLATE_B64" | base64 -d > work/plate.jpg
        env:
          PLATE_B64: ""

      - name: Download source video 0717.zip
        run: |
          set -e
          curl -L --fail --retry 5 --retry-delay 5 \
            "https://drive.usercontent.google.com/download?id=1VyhOqzO5FuHcnSRKzDpA40AK_4hJkqSQ&export=download&confirm=t" \
            -o 0717.zip
          mkdir -p src && unzip -o 0717.zip -d src
          VID=$(find src -type f \( -iname '*.mp4' -o -iname '*.mov' -o -iname '*.webm' -o -iname '*.mkv' \) | head -1)
          echo "VIDEO=$VID" >> $GITHUB_ENV

      - name: Prep audio + background
        run: |
          set -e
          ffmpeg -y -i "$VIDEO" -vn -c:a aac -b:a 256k work/audio.m4a
          ffmpeg -y -i work/plate.jpg -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080" work/bg.png

      - name: Matte + color-match + composite + push-in
        run: |
          set -e
          cat > stream.py <<'PY'
          import os, subprocess
          import numpy as np
          from rembg import remove, new_session
          from PIL import Image, ImageFilter
          OW, OH, FPS = 1920, 1080, 30
          VIDEO = os.environ["VIDEO"]
          sess = new_session("u2net_human_seg")
          bg = Image.open("work/bg.png").convert("RGBA")
          bg_np = np.asarray(bg.convert("RGB")).astype(np.float32)
          set_mean = bg_np.reshape(-1,3).mean(0) + 1e-6
          dec = subprocess.Popen(
              ["ffmpeg","-i",VIDEO,"-vf",f"scale={OW}:{OH}:flags=lanczos","-r",str(FPS),
               "-f","rawvideo","-pix_fmt","rgb24","-"],
              stdout=subprocess.PIPE, stderr=subprocess.DEVNULL)
          enc = subprocess.Popen(
              ["ffmpeg","-y","-f","rawvideo","-pix_fmt","rgb24","-s",f"{OW}x{OH}","-r",str(FPS),"-i","-",
               "-c:v","libx264","-preset","medium","-crf","16","-pix_fmt","yuv420p",
               "work/video_noaudio.mp4"],
              stdin=subprocess.PIPE, stderr=subprocess.DEVNULL)
          try:
              dur = float(subprocess.check_output(["ffprobe","-v","error","-show_entries","format=duration","-of","csv=p=0",VIDEO]).decode().strip())
          except Exception:
              dur = 420.0
          total = max(int(dur*FPS), 1)
          qc_at = {int(total*p) for p in (0.02,0.25,0.5,0.75,0.98)}
          fsize = OW*OH*3
          prev_alpha = None
          i = 0
          while True:
              raw = dec.stdout.read(fsize)
              if len(raw) < fsize: break
              frame = Image.frombytes("RGB",(OW,OH),raw).convert("RGBA")
              cut = remove(frame, session=sess)
              arr = np.asarray(cut).astype(np.float32)
              rgb, alpha = arr[...,:3], arr[...,3]
              m = alpha > 8
              if m.any():
                  fg_mean = rgb[m].mean(0) + 1e-6
                  gain = 1.0 + (set_mean/fg_mean - 1.0)*0.45
                  gain = np.clip(gain, 0.90, 1.12)
                  rgb = np.clip(rgb*gain, 0, 255)
              if prev_alpha is not None:
                  alpha = 0.7*alpha + 0.3*prev_alpha
              prev_alpha = alpha
              a_img = Image.fromarray(alpha.astype(np.uint8),"L").filter(ImageFilter.GaussianBlur(0.7))
              cut = Image.fromarray(np.dstack([rgb, np.asarray(a_img)[...,None].astype(np.float32)]).astype(np.uint8),"RGBA")
              # zoom out on Courtney: 88% scale, bottom-anchored, centered
              PS = 0.88
              sw, sh = int(OW*PS), int(OH*PS)
              cut_s = cut.resize((sw, sh), Image.LANCZOS)
              canvas = Image.new("RGBA",(OW,OH),(0,0,0,0))
              px, py = (OW-sw)//2, OH-sh
              canvas.paste(cut_s, (px, py), cut_s)
              cut = canvas
              a_small = cut.split()[3]
              sa = a_small.filter(ImageFilter.GaussianBlur(10)).point(lambda v: int(v*0.4))
              shadow = Image.new("RGBA",(OW,OH),(0,0,0,0)); shadow.putalpha(sa)
              shadow = shadow.transform((OW,OH), Image.AFFINE, (1,0,int(OW*0.005),0,1,int(OH*0.012)))
              comp = Image.alpha_composite(bg.copy(), shadow)
              comp = Image.alpha_composite(comp, cut).convert("RGB")
              # slow cinematic push-in over full duration (1.00 -> 1.05)
              z = 1.0 + 0.05*min(i/total, 1.0)
              zw, zh = int(OW*z), int(OH*z)
              comp = comp.resize((zw, zh), Image.LANCZOS)
              x0, y0 = (zw-OW)//2, (zh-OH)//2
              comp = comp.crop((x0, y0, x0+OW, y0+OH))
              if i in qc_at:
                  comp.save(f"deliverables/qc/qc_{i:06d}.png")
              enc.stdin.write(comp.tobytes())
              i += 1
              if i % 300 == 0: print("frames", i, flush=True)
          enc.stdin.close(); enc.wait(); dec.wait()
          print("TOTAL FRAMES", i, flush=True)
          PY
          python3 stream.py

      - name: Mux original monologue audio (exact, unchanged)
        run: |
          set -e
          ffmpeg -y -i work/video_noaudio.mp4 -i work/audio.m4a \
            -c:v copy -c:a aac -b:a 256k -shortest out/Courtney_NEWSET_FINAL_0717.mp4
          ffprobe -v error -show_entries format=duration,size -show_entries stream=codec_type,width,height -of default=noprint_wrappers=1 out/Courtney_NEWSET_FINAL_0717.mp4

      - name: Add FINAL card to landing page (autoplay + download)
        run: |
          python3 - <<'PY'
          html = open('index.html').read()
          if 'Courtney_NEWSET_FINAL_0717' not in html:
              url = "https://media.githubusercontent.com/media/gitteromri-ux/lla-s09-s10-downloads/main/deliverables/Courtney_NEWSET_FINAL_0717.mp4"
              sec = ('\n<h2>&#9733; FINAL &middot; Courtney &middot; NEW SET (0717)</h2>\n'
                     '<p class="sec-note">Courtney planted in the new set &middot; original monologue audio &middot; 1920&times;1080 &middot; final master</p>\n'
                     '<div class="grid">\n<div class="card"><h3>Courtney &middot; New Set &middot; FINAL</h3><div class="meta">FINAL &middot; 1080p</div>\n'
                     f'<video src="{url}" autoplay muted loop playsinline controls preload="metadata"></video>\n'
                     f'<div class="btn-row"><a class="btn" href="{url}" download>&#11015; Download FINAL</a></div></div>\n</div>\n')
              i = html.find('class="lede"')
              j = html.find('</p>', i) + 4
              open('index.html','w').write(html[:j] + sec + html[j:])
              print("index.html updated")
          PY

      - name: Upload result + QC stills as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Courtney_NEWSET_FINAL_0717
          path: |
            out/*.mp4
            deliverables/qc/*.png
          if-no-files-found: error

      - name: Commit deliverable + page + QC stills (git LFS)
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git lfs track "*.mp4" || true
          cp out/Courtney_NEWSET_FINAL_0717.mp4 deliverables/
          git add .gitattributes index.html deliverables/Courtney_NEWSET_FINAL_0717.mp4 deliverables/qc/*.png
          git commit -m "FINAL: Courtney on chosen new set (0717) + landing page card" || echo "nothing to commit"
          for n in 1 2 3 4; do git push origin HEAD:main && break || sleep $((2**n)); done
