name: Fetch assets

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Space-separated URLs to fetch"
        required: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Download
        env:
          URLS: ${{ github.event.inputs.urls }}
        run: |
          set -e
          rm -rf deliverables/fetched && mkdir -p deliverables/fetched
          i=0
          printf '%s\n' "$URLS" | tr '|' '\n' | while read -r u; do
            [ -z "$u" ] && continue
            i=$((i+1))
            curl -sL --max-time 120 "$u" -o "deliverables/fetched/asset_$i" || true
            ext=$(file -b --mime-type "deliverables/fetched/asset_$i" | cut -d/ -f2)
            mv "deliverables/fetched/asset_$i" "deliverables/fetched/asset_$i.$ext" || true
          done
          ls -la deliverables/fetched
      - name: Commit
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deliverables/fetched
          git commit -m "Fetched assets" || echo nothing
          for n in 1 2 3; do git pull --rebase origin main && git push origin HEAD:main && break || sleep $((2**n)); done
