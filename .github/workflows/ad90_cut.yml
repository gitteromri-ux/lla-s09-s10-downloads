name: AD90 (90s paid Meta cut)

on:
  workflow_dispatch:
    inputs:
      clean_run_id:
        description: "Run id of clean assembly artifact"
        required: false
        default: "29731883948"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/download-artifact@v4
        with:
          name: Courtney_CINEMA_FINAL_0717
          run-id: ${{ github.event.inputs.clean_run_id }}
          github-token: ${{ github.token }}
          path: art
      - name: Setup
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg git-lfs
          pip3 install --quiet fonttools
          cp art/Courtney_CINEMA_FINAL_0717.mp4 base.mp4
          mkdir -p fonts
          curl -sL --fail -o Fraunces_var.ttf "https://github.com/google/fonts/raw/main/ofl/fraunces/Fraunces%5BSOFT%2CWONK%2Copsz%2Cwght%5D.ttf"
          curl -sL --fail -o Inter_var.ttf "https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf"
          fonttools varLib.instancer -q -o fonts/Inter-Bold.ttf Inter_var.ttf wght=700 opsz=32
          fonttools varLib.instancer -q -o fonts/Fraunces-Display.ttf Fraunces_var.ttf wght=480 opsz=144 SOFT=0 WONK=0
          # continuous room tone bed (quiet stretch of the raw)
          ffmpeg -y -loglevel error -ss 102.30 -t 3.20 -i base.mp4 -vn -c:a pcm_s16le tone.wav
          A="https://media.githubusercontent.com/media/${{ github.repository }}/claude/video-0717-background-replace-qm11te/production"
          R="https://raw.githubusercontent.com/${{ github.repository }}/claude/video-0717-background-replace-qm11te/production"
          for c in cta1 cta2 cta3 end; do
            curl -sS -L --fail --retry 4 "$R/cards/png/horizontal/${c}_h.png" -o "${c}.png" \
              || curl -sS -L --fail --retry 4 "$A/cards/png/horizontal/${c}_h.png" -o "${c}.png"
          done
          for c in site_yoga site_nutrition site_sleep swimmer_dawn site_supplements site_wearables data_curve oximeter_data; do
            curl -sS -L --fail --retry 4 "$A/footage/clips/$c.mp4" -o "$c.mp4"
          done
          # client-supplied insert: longevity-noise screens montage (ADD-1, 8K)
          curl -sS -L --fail --retry 4 \
            "https://media.githubusercontent.com/media/${{ github.repository }}/main/deliverables/fetched/asset_1.mp4" -o noise_screens.mp4
      - name: Build cut + captions + headlines
        run: |
          set -e
          python3 - <<'PY'
          import json, subprocess, os
          T = json.load(open("production/transcript_0717.json"))
          words = [(w["s"], w["e"], w["w"].strip()) for seg in T for w in seg["words"]]
          FF="ffmpeg"; W,H,FPS=1920,1080,30
          os.makedirs("seg", exist_ok=True)
          GRADE="curves=preset=medium_contrast,eq=saturation=1.06:brightness=0.012,colorbalance=rm=.035:bm=-.035"
          TIGHT="crop=1600:900:(iw-1600)/2:(ih-900)*0.30,scale=1920:1080:flags=lanczos,"
          ACTS=[
            dict(name="hook", s=39.60, e=66.60,
                 heads=[(44.90,"LONGEVITY ADVICE IS EVERYWHERE."),
                        (58.74,"YOUR DIRECT PATH TO LONGEVITY")],
                 emph=[44.16,50.52,58.74],
                 broll=[("noise_screens",44.90,5.60),("site_yoga",53.90,3.40)]),
            dict(name="why", s=92.00, e=101.60,
                 heads=[(92.10,"WHY LONGEVITY NEVER STUCK FOR YOU")],
                 emph=[94.30,96.70,99.04], broll=[]),
            dict(name="pillars", s=127.40, e=146.20,
                 heads=[(127.50,"THE SIX PILLARS OF A LONGER LIFE")],
                 emph=[133.00],
                 broll=[("site_nutrition",137.10,1.90),("site_sleep",139.00,1.80),
                        ("swimmer_dawn",140.80,1.80),("site_supplements",142.60,1.90),
                        ("site_wearables",144.50,1.70)]),
            dict(name="blueprint", s=153.70, e=160.70,
                 heads=[], emph=[157.28], broll=[]),
            dict(name="proof", s=170.90, e=185.50,
                 heads=[(171.00,"+14 YEARS LIFE TRAJECTORY")],
                 emph=[183.20],
                 broll=[("data_curve",171.20,5.00)]),
            dict(name="academy", s=195.80, e=212.50,
                 heads=[(195.94,"LONGEVITY LIFE ACADEMY · 18 LIVE SESSION COURSE")],
                 emph=[199.80,205.16,208.80], broll=[]),
            dict(name="close", s=394.30, e=400.40,
                 heads=[(394.44,"YOUR LONGEVITY BLUEPRINT")],
                 emph=[397.72], broll=[]),
          ]
          CARDS_AFTER={"blueprint":"cta1","academy":"cta3"}
          gaps=[]
          for i in range(len(words)-1):
              g0,g1 = words[i][1], words[i+1][0]
              if g1-g0 >= 0.10: gaps.append((g0+g1)/2)
          def snap(t, lo, hi):
              c=[g for g in gaps if lo< g < hi]
              return min(c, key=lambda g: abs(g-t)) if c else t
          idx=0; tight=False
          def enc_her(ss,dur,tg):
              global idx; idx+=1
              vf=(TIGHT if tg else "")+GRADE+f",scale={W}:{H},fps={FPS}"
              subprocess.run([FF,"-y","-loglevel","error","-ss",str(ss),"-t",str(dur),"-i","base.mp4",
                "-vf",vf,"-af",f"afade=t=in:d=0.02,afade=t=out:st={max(0,dur-0.02)}:d=0.02",
                "-c:v","libx264","-crf","17","-preset","fast","-pix_fmt","yuv420p",
                "-c:a","aac","-ar","48000","-ac","2",f"seg/{idx:03d}.mp4"],check=True)
          def enc_broll(clip,dur,a_ss):
              global idx; idx+=1
              if clip=="noise_screens":
                  vf=(f"crop=w=iw*0.80:h=ih*0.80:x=(iw-ow)*0.5*min(1\\,t/{dur}):y=(ih-oh)*0.25,"
                      f"scale={W}:{H}:flags=lanczos,fps={FPS},"+GRADE)
              else:
                  vf=(f"scale={W}:{H}:force_original_aspect_ratio=increase,crop={W}:{H},fps={FPS},"
                      +GRADE+(",eq=brightness=0.10:saturation=1.05" if clip=="oximeter_data" else ",eq=brightness=0.04")+",unsharp=5:5:0.4")
              subprocess.run([FF,"-y","-loglevel","error","-stream_loop","-1","-t",str(dur),"-i",f"{clip}.mp4",
                "-ss",str(a_ss),"-t",str(dur),"-i","base.mp4","-map","0:v","-map","1:a",
                "-vf",vf,
                "-af",f"afade=t=in:d=0.02,afade=t=out:st={max(0,dur-0.02)}:d=0.02",
                "-c:v","libx264","-crf","17","-preset","fast","-pix_fmt","yuv420p",
                "-c:a","aac","-ar","48000","-ac","2",f"seg/{idx:03d}.mp4"],check=True)
          def enc_card(png,dur):
              global idx; idx+=1
              subprocess.run([FF,"-y","-loglevel","error","-loop","1","-t",str(dur),"-i",png,
                "-f","lavfi","-t",str(dur),"-i","anullsrc=r=48000:cl=stereo",
                "-vf",f"scale={W}:{H},fps={FPS},fade=t=in:d=0.45,fade=t=out:st={dur-0.45}:d=0.45",
                "-c:v","libx264","-crf","17","-preset","fast","-pix_fmt","yuv420p",
                "-c:a","aac","-shortest",f"seg/{idx:03d}.mp4"],check=True)
          def enc_freeze(frame_at,a_ss,dur):
              global idx; idx+=1
              subprocess.run([FF,"-y","-loglevel","error","-ss",str(frame_at),"-i","base.mp4",
                "-frames:v","1","hold.png"],check=True)
              subprocess.run([FF,"-y","-loglevel","error","-loop","1","-t",str(dur),"-i","hold.png",
                "-ss",str(a_ss),"-t",str(dur),"-i","base.mp4","-map","0:v","-map","1:a",
                "-vf",GRADE+f",scale={W}:{H},fps={FPS}",
                "-af","afade=t=in:d=0.02",
                "-c:v","libx264","-crf","17","-preset","fast","-pix_fmt","yuv420p",
                "-c:a","aac","-ar","48000","-ac","2",f"seg/{idx:03d}.mp4"],check=True)
          def her_range(a,b,emph,force_tight_from=None):
              global tight
              pts=sorted([t for t in emph if a+0.6 < t < b-0.5])
              marks=[a]+pts+[b]
              for i in range(len(marks)-1):
                  x0,x1=marks[i],marks[i+1]
                  cur=x0
                  while x1-cur > 4.8:
                      nxt=snap(cur+3.0, cur+1.4, x1-0.8)
                      if nxt<=cur+0.5: break
                      tg = tight if not (force_tight_from and cur>=force_tight_from) else True
                      enc_her(cur, nxt-cur, tg); tight=not tight; cur=nxt
                  if x1-cur>0.25:
                      tg = tight if not (force_tight_from and cur>=force_tight_from) else True
                      enc_her(cur, x1-cur, tg); tight=not tight
          out_t=0.0; act_map=[]; heads=[]; music_marks={}
          enc_card("end.png",2.2); out_t+=2.2
          for act in ACTS:
              music_marks[act["name"]]=out_t
              for ht,txt in act["heads"]:
                  heads.append((out_t + max(0.15, ht-act["s"]), txt))
              ftf = 397.72 if act["name"]=="close" else None
              cur=act["s"]
              for clip,bs,bd in sorted(act["broll"], key=lambda b:b[1]):
                  her_range(cur, bs, act["emph"], ftf)
                  enc_broll(clip, bd, bs); cur=bs+bd
              her_range(cur, act["e"], act["emph"], ftf)
              if act["name"]=="close":
                  enc_freeze(400.30, 400.40, 1.70)
                  act_map.append((act["s"], 402.10, out_t))
                  out_t += (act["e"]-act["s"]) + 1.70
              else:
                  act_map.append((act["s"],act["e"],out_t))
                  out_t += act["e"]-act["s"]
              if act["name"] in CARDS_AFTER:
                  enc_card(CARDS_AFTER[act["name"]]+".png", 2.5); out_t+=2.5
          music_marks["end"]=out_t
          enc_card("end.png",4.2); out_t+=4.2
          with open("list.txt","w") as f:
              for k in range(1,idx+1): f.write(f"file 'seg/{k:03d}.mp4'\n")
          subprocess.run([FF,"-y","-loglevel","error","-f","concat","-safe","0","-i","list.txt","-c","copy","cut.mp4"],check=True)
          def src2out(t):
              for s,e,o in act_map:
                  if s-0.3 <= t <= e+0.3: return o + (t-s)
              return None
          HILITE={"direct","path","six","pillars","18","14","blueprint","class","session","seat","courtney","longevity","academy","harvard"}
          BLUE=r"{\c&HFF6E00&}"; WHITE=r"{\c&HFFFFFF&}"
          lines=[]; cur=[]; t0=None
          for s,e,wd in words:
              o=src2out(s)
              if o is None:
                  if cur: lines.append((t0,last_e,cur)); cur=[]; t0=None
                  continue
              if t0 is None: t0=o
              cur.append(wd); last_e=src2out(e) or (o+0.4)
              if len(cur)>=5 or (wd and wd[-1] in ".!?,;" and len(cur)>=3):
                  lines.append((t0,last_e,cur)); cur=[]; t0=None
          if cur: lines.append((t0,last_e,cur))
          def ts(t): return f"{int(t//3600)}:{int(t%3600//60):02d}:{t%60:05.2f}"
          ass=("[Script Info]\nPlayResX: 1920\nPlayResY: 1080\nWrapStyle: 0\n\n[V4+ Styles]\n"
            "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n"
            "Style: Cap,Inter,96,&H00FFFFFF,&H00FFFFFF,&H00000000,&H98000000,0,0,0,0,100,100,0.2,0,1,0,2.2,2,90,90,205,1\n"
            "Style: Head,Fraunces,86,&H00EAF2F5,&H00EAF2F5,&H8A341608,&H8A341608,0,0,0,0,100,100,9,0,3,16,0,8,60,60,120,1\n\n"
            "[Events]\nFormat: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n")
          for st,en,ws in lines:
              txt=" ".join((BLUE+w+WHITE) if w.strip(".,!?;").lower() in HILITE else w for w in ws)
              cap=txt[0].upper()+txt[1:] if txt and txt[0].isalpha() else txt
              ass+=f"Dialogue: 0,{ts(st)},{ts(max(en,st+0.7))},Cap,,0,0,0,,{{\\fad(110,90)}}{cap}\n"
          for ht,txt in heads:
              ass+=f"Dialogue: 1,{ts(ht)},{ts(ht+3.2)},Head,,0,0,0,,{{\\fad(380,380)\\fsp7\\t(0,600,\\fsp10)}}{txt}\n"
          open("caps.ass","w").write(ass)
          json.dump(music_marks, open("marks.json","w"))
          print("segments:",idx,"out:",round(out_t,1),"caps:",len(lines))
          PY
      - name: Final encode (captions + music arc + room tone)
        run: |
          set -e
          python3 - <<'PY'
          import json, subprocess
          mk=json.load(open("marks.json"))
          D=float(subprocess.run(["ffprobe","-v","error","-show_entries","format=duration","-of","csv=p=0","cut.mp4"],capture_output=True,text=True).stdout)
          tp,tc,te = mk["proof"], mk["close"], mk["end"]
          vol=(f"if(lt(t,{tp}),0.12,"
               f"if(lt(t,{tc}),0.12+0.08*min(1,(t-{tp})/3),"
               f"if(lt(t,{te}),0.20+0.18*min(1,(t-{tc})/4),0.42)))")
          cmd=["ffmpeg","-y","-loglevel","error","-i","cut.mp4",
            "-stream_loop","-1","-i","assets/music_bed_0717.mp3",
            "-stream_loop","-1","-i","tone.wav",
            "-filter_complex",
            f"[0:v]subtitles=caps.ass:fontsdir=fonts[vout];"
            f"[1:a]volume=volume='{vol}':eval=frame,afade=t=out:st={D-0.9}:d=0.9[mus];"
            f"[2:a]volume=0.55,afade=t=out:st={D-1.5}:d=1.5[tone];"
            f"[0:a][mus][tone]amix=inputs=3:duration=first:normalize=0[aout]",
            "-map","[vout]","-map","[aout]","-c:v","libx264","-crf","16","-preset","medium",
            "-pix_fmt","yuv420p","-c:a","aac","-b:a","256k","-movflags","+faststart","Courtney_AD90.mp4"]
          subprocess.run(cmd,check=True)
          subprocess.run(["ffprobe","-v","error","-show_entries","format=duration,size","-of","default=noprint_wrappers=1","Courtney_AD90.mp4"],check=True)
          PY
          mkdir -p deliverables/qc_cinema
          for p in 1 4 10 16 24 34 44 52 62 72 82 88 94; do
            ffmpeg -y -loglevel error -ss "$p" -i Courtney_AD90.mp4 -frames:v 1 "deliverables/qc_cinema/ad90_${p}.jpg" || true
          done
      - name: Publish to finalcut page
        run: |
          set -e
          python3 - <<'PY'
          html=open('finalcut/index.html').read()
          if 'Courtney_AD90' not in html:
              url="https://media.githubusercontent.com/media/gitteromri-ux/lla-s09-s10-downloads/main/deliverables/Courtney_AD90.mp4"
              sec=('\n<h2>&#127942; AD90 · PAID META CUT <span class="badge">90 SECONDS</span></h2>\n'
                   '<p class="note">Final takes only · act headlines · large captions · word-linked footage · music arc to close</p>\n'
                   '<div class="card">\n<h3>Courtney · AD90 Paid Cut</h3><div class="meta">1080p · LEAD-GEN MASTER</div>\n'
                   f'<video src="{url}" autoplay muted loop playsinline controls preload="metadata"></video>\n'
                   f'<br><a class="btn" href="{url}" download>&#11015; Download AD90</a>\n</div>\n')
              i=html.find('<h2>')
              open('finalcut/index.html','w').write(html[:i]+sec+html[i:])
              print("page card added")
          PY
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git lfs track "*.mp4" || true
          cp Courtney_AD90.mp4 deliverables/
          git add .gitattributes finalcut/index.html deliverables/Courtney_AD90.mp4 deliverables/qc_cinema
          git commit -m "AD90: 90s paid Meta cut"
          for n in 1 2 3 4; do git pull --rebase origin main && git push origin HEAD:main && break || (sleep $((2**n))); done
      - uses: actions/upload-artifact@v4
        with:
          name: Courtney_AD90
          path: Courtney_AD90.mp4
          if-no-files-found: error
