name: ASSEMBLE 90s MASTER (music, animated cards, neon outro)

# Machine-assembles the Courtney 90s ad from the hub plan:
# razors her blocks (audio continuous), cuts b-roll over the visuals at the
# planned phrases, inserts CTA cards at 23/54/77/end, Atelier silence mix.
# Output: deliverables/Courtney_AD90_FINAL.mp4 (LFS, this branch).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Get materials
        run: |
          set -e
          mkdir -p work
          M="https://media.githubusercontent.com/media/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}"
          curl -sL --fail "$M/deliverables/Courtney_BGSWAP_0717.mp4" -o work/base.mp4
          for c in capsules_macro noise_scroll noise_off path_dawn seat_light site_ctabg site_nutrition site_sleep site_yoga site_supplements site_coldplunge data_curve site_protocol; do
            curl -sL --fail "$M/production/footage/clips/$c.mp4" -o "work/$c.mp4"
          done
          for c in cta1 cta2 cta3 outro; do
            curl -sL --fail "$M/production/cards/anim/${c}_h.mp4" -o "work/anim_${c}_h.mp4"
          done
          for u in "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Meditation%20Impromptu%2002.mp3" "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Heart%20of%20Nowhere.mp3" "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Almost%20in%20F.mp3"; do
            curl -sL --max-time 60 "$u" -o work/bed.mp3 || continue
            ffprobe -v error -show_entries format=duration -of csv=p=0 work/bed.mp3 >/dev/null 2>&1 && { echo "temp bed: $u"; break; } || rm -f work/bed.mp3
          done
          ls -la work

      - name: Build edit
        run: |
          set -e
          python3 - <<'PY'
          import subprocess, os
          FF = "ffmpeg"
          W,H,FPS = 1920,1080,30
          os.makedirs("seg", exist_ok=True)

          def her(idx, ss, dur):
              # her video+audio segment from base
              subprocess.run([FF,"-y","-ss",str(ss),"-t",str(dur),"-i","work/base.mp4",
                "-vf",f"scale={W}:{H},fps={FPS},colorbalance=rh=.04:gh=.02:bs=-.04,eq=contrast=1.06:saturation=1.02,vignette=PI/5,noise=alls=4:allf=t+u","-c:v","libx264","-crf","17","-preset","fast",
                "-c:a","aac","-ar","48000","-ac","2",f"seg/{idx:02d}.mp4"],check=True)

          def broll(idx, clip, dur, a_ss, a_dur_off):
              # b-roll visual + HER AUDIO underneath (audio from base at a_ss+a_dur_off)
              subprocess.run([FF,"-y","-stream_loop","-1","-t",str(dur),"-i",f"work/{clip}.mp4",
                "-ss",str(a_ss+a_dur_off),"-t",str(dur),"-i","work/base.mp4",
                "-map","0:v","-map","1:a","-vf",f"scale={W}:{H}:force_original_aspect_ratio=increase,crop={W}:{H},fps={FPS},curves=preset=medium_contrast,colorbalance=rh=.05:gh=.02:bh=-.05:bs=-.05:rs=.02,eq=saturation=0.94:contrast=1.05,vignette=PI/4.5,noise=alls=7:allf=t+u",
                "-c:v","libx264","-crf","17","-preset","fast","-c:a","aac","-ar","48000","-ac","2",
                f"seg/{idx:02d}.mp4"],check=True)

          def cardseg(idx, png, dur):
              cid = png.split("/")[-1].replace("_h.png","").replace(".png","")
              anim = f"work/anim_{cid}_h.mp4"
              if os.path.exists(anim):
                  subprocess.run([FF,"-y","-t",str(dur),"-i",anim,
                    "-f","lavfi","-t",str(dur),"-i","anullsrc=r=48000:cl=stereo",
                    "-vf",f"scale={W}:{H},fps={FPS}","-c:v","libx264","-crf","17","-preset","fast",
                    "-c:a","aac","-shortest",f"seg/{idx:02d}.mp4"],check=True)
              else:
                  subprocess.run([FF,"-y","-loop","1","-t",str(dur),"-i",png,
                    "-f","lavfi","-t",str(dur),"-i","anullsrc=r=48000:cl=stereo",
                    "-vf",f"scale={W}:{H},fps={FPS}","-c:v","libx264","-crf","17","-preset","fast",
                    "-c:a","aac","-shortest",f"seg/{idx:02d}.mp4"],check=True)

          i=0
          def nx():
              global i; i+=1; return i

          # ACT I - hook: her -> the NOISE itself (doomscroll) -> selling -> back to her
          her(nx(), 37.4, 4.0)
          broll(nx(), "noise_scroll", 5.0, 37.4, 4.0)
          broll(nx(), "capsules_macro", 2.4, 37.4, 9.0)
          her(nx(), 48.8, 5.0)
          # ACT II - turn: "Take a breath" on her -> phone down -> THE PATH on "direct path"
          her(nx(), 53.8, 3.0)
          broll(nx(), "noise_off", 4.0, 53.8, 3.0)
          broll(nx(), "path_dawn", 6.36, 53.8, 7.0)
          cardseg(nx(), "production/cards/png/horizontal/cta1_h.png", 3.0)
          # ACT III - pillars 127.34-146.88 (19.54s)
          her(nx(), 127.34, 6.0)
          broll(nx(), "site_nutrition", 2.2, 127.34, 6.0)
          broll(nx(), "site_sleep", 2.2, 127.34, 8.2)
          broll(nx(), "site_yoga", 2.2, 127.34, 10.4)
          broll(nx(), "site_supplements", 2.2, 127.34, 12.6)
          broll(nx(), "site_coldplunge", 2.2, 127.34, 14.8)
          cardseg(nx(), "production/cards/png/horizontal/cta2_h.png", 3.0)
          # ACT IV - proof 170.4-183.28 (12.88s)
          her(nx(), 170.4, 4.0)
          broll(nx(), "data_curve", 5.0, 170.4, 4.0)
          her(nx(), 179.4, 3.88)
          # ACT V - offer 204.92-212.96 (8.04s)
          broll(nx(), "site_ctabg", 4.0, 204.92, 0.0)
          her(nx(), 208.92, 4.04)
          cardseg(nx(), "production/cards/png/horizontal/cta3_h.png", 3.0)
          # ACT VI - close: her truth -> THE EMPTY SEAT on "there's a seat for you" -> her sign-off
          her(nx(), 383.0, 11.4)
          broll(nx(), "seat_light", 3.56, 383.0, 11.4)
          her(nx(), 397.96, 4.36)
          cardseg(nx(), "production/cards/png/horizontal/outro_h.png", 4.2)

          with open("list.txt","w") as f:
              for k in range(1, i+1):
                  f.write(f"file 'seg/{k:02d}.mp4'\n")
          subprocess.run([FF,"-y","-f","concat","-safe","0","-i","list.txt",
              "-c:v","libx264","-crf","17","-preset","medium","-pix_fmt","yuv420p",
              "-c:a","aac","-b:a","256k","cut.mp4"],check=True)
          # durations -> card times for the music envelope
          import json as _json
          def dur(p):
              return float(subprocess.run(["ffprobe","-v","error","-show_entries","format=duration",
                  "-of","csv=p=0",p],capture_output=True,text=True).stdout.strip())
          T = dur("cut.mp4")
          segd = [dur(f"seg/{k:02d}.mp4") for k in range(1, i+1)]
          starts = []
          acc = 0.0
          for d in segd: starts.append(acc); acc += d
          # cards are the cardseg segments: find by matching known durations 3.0/3.0/3.0/4.2 in order
          card_ts = [t for t,d in zip(starts,segd) if abs(d-3.0)<0.15 or abs(d-4.2)<0.15]
          print("card times:", card_ts, "total:", T)
          fades = f"fade=t=in:st=0:d=0.5,fade=t=out:st={T-0.8:.2f}:d=0.8"
          import os as _os
          if _os.path.exists("work/bed.mp3"):
              c1,c2,c3,c4 = (card_ts + [20,50,75,85])[:4]
              # keyframed envelope with 0.5s linear ramps (an editor's fader, not a switch)
              keys = [(0,0.10),(8,0.14),(c1-0.5,0.14),(c1,0.42),(c1+2.6,0.42),(c1+3.2,0.14),
                      (c2-0.5,0.14),(c2,0.42),(c2+2.6,0.42),(c2+3.2,0.14),
                      (c3-1.6,0.14),(c3-1.1,0.02),(c3-0.05,0.02),(c3,0.5),(c3+2.8,0.5),
                      (c4-0.5,0.2),(c4,0.55),(T,0.55)]
              expr = f"{keys[-1][1]:.3f}"
              for (t0,v0),(t1,v1) in reversed(list(zip(keys, keys[1:]))):
                  seg_expr = f"({v0:.3f}+({v1:.3f}-{v0:.3f})*(t-{t0:.2f})/{max(t1-t0,0.01):.2f})"
                  expr = f"if(lt(t,{t1:.2f}),{seg_expr},{expr})"
              env = f"volume='{expr}':eval=frame"
              fc = (f"[1:a]aloop=loop=-1:size=2e9,atrim=0:{T:.2f},{env},afade=t=out:st={T-1.2:.2f}:d=1.2[m];"
                    f"[0:a][m]amix=inputs=2:duration=first:normalize=0[aout];"
                    f"[0:v]{fades}[vout]")
              subprocess.run([FF,"-y","-i","cut.mp4","-i","work/bed.mp3",
                  "-filter_complex",fc,"-map","[vout]","-map","[aout]",
                  "-c:v","libx264","-crf","17","-preset","medium","-pix_fmt","yuv420p",
                  "-c:a","aac","-b:a","256k","-movflags","+faststart",
                  "Courtney_AD90_FINAL.mp4"],check=True)
          else:
              subprocess.run([FF,"-y","-i","cut.mp4","-vf",fades,
                  "-c:v","libx264","-crf","17","-preset","medium",
                  "-c:a","copy","-movflags","+faststart","Courtney_AD90_FINAL.mp4"],check=True)
          subprocess.run(["ffprobe","-v","error","-show_entries","format=duration,size",
              "-of","default=noprint_wrappers=1","Courtney_AD90_FINAL.mp4"])
          # measured audit
          with open("EDIT_AUDIT.md","w") as f:
              f.write("# Master edit - measured audit\n\n")
              f.write(f"Total runtime: {T:.2f}s\n\nCard times (s): {', '.join(f'{t:.2f}' for t in card_ts)}\n\n")
              f.write("| # | start | dur | type |\n|---|---|---|---|\n")
              for k,(st,d) in enumerate(zip(starts,segd),1):
                  typ = "CARD" if (abs(d-3.0)<0.15 or abs(d-4.2)<0.15) else "footage/talent"
                  f.write(f"| {k} | {st:.2f} | {d:.2f} | {typ} |\n")

          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Courtney_AD90_FINAL
          path: Courtney_AD90_FINAL.mp4
          if-no-files-found: error

      - name: Commit (LFS)
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          mkdir -p deliverables
          cp Courtney_AD90_FINAL.mp4 deliverables/
          cp EDIT_AUDIT.md production/EDIT_AUDIT.md || true
          git add deliverables/Courtney_AD90_FINAL.mp4 production/EDIT_AUDIT.md
          git commit -m "ASSEMBLED: 90s FINAL: Atelier structure, single CTA, graded"
          for n in 1 2 3 4; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break || sleep $((2**n))
          done
