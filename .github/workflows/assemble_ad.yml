name: ASSEMBLE 90s MASTER (music, animated cards, neon outro)

# Machine-assembles the Courtney 90s ad from the hub plan:
# razors her blocks (audio continuous), cuts b-roll over the visuals at the
# planned phrases, inserts CTA cards at 23/54/77/end, Atelier silence mix.
# Output: deliverables/Courtney_AD90_FINAL.mp4 (LFS, this branch).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Get materials
        run: |
          set -e
          mkdir -p work fonts
          TS=$(date +%s)
          M="https://media.githubusercontent.com/media/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}"
          curl -sL --fail "$M/deliverables/Courtney_BGSWAP_0717.mp4?nc=$TS" -o work/base.mp4
          for c in capsules_macro noise_scroll noise_off path_dawn seat_light site_ctabg site_nutrition site_sleep site_yoga site_supplements site_coldplunge data_curve site_protocol site_mental site_wearables food_flatlay swimmer_dawn oximeter_data; do
            curl -sL --fail "$M/production/footage/clips/$c.mp4" -o "work/$c.mp4"
          done
          # brand fonts for captions + headlines
          curl -sL --fail -o fonts/Fraunces.ttf "https://github.com/google/fonts/raw/main/ofl/fraunces/Fraunces%5BSOFT%2CWONK%2Copsz%2Cwght%5D.ttf"
          curl -sL --fail -o fonts/Inter.ttf "https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf"
          for c in open cta1 cta2 cta3 outro; do
            curl -sL --fail "$M/production/cards/anim/${c}_h.mp4?nc=$TS" -o "work/anim_${c}_h.mp4"
          done
          curl -sL --fail "$M/production/music/fa_sting.m4a" -o work/fa_sting.m4a || true
          # THE bed, in order of preference:
          # 1. client-supplied track (regular git file, already in checkout — no CDN)
          # 2. stem-separated FA music  3. temp bed
          if [ -f production/music/client_track_lgvty.mp3 ]; then
            cp production/music/client_track_lgvty.mp3 work/fa_bed.m4a
          else
            curl -sL --fail "$M/production/music/fa_music_bed_long.m4a?nc=$TS" -o work/fa_bed.m4a || true
          fi
          if ffprobe -v error -show_entries format=duration -of csv=p=0 work/fa_bed.m4a >/dev/null 2>&1; then
            echo "bed: $(ffprobe -v error -show_entries format=duration -of csv=p=0 work/fa_bed.m4a)s real music bed"
          else
            rm -f work/fa_bed.m4a
            for u in "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Meditation%20Impromptu%2002.mp3" "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Heart%20of%20Nowhere.mp3" "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Almost%20in%20F.mp3"; do
              curl -sL --max-time 60 "$u" -o work/bed.mp3 || continue
              ffprobe -v error -show_entries format=duration -of csv=p=0 work/bed.mp3 >/dev/null 2>&1 && { echo "temp bed: $u"; break; } || rm -f work/bed.mp3
            done
          fi
          ls -la work

      - name: Build edit
        run: |
          set -e
          python3 - <<'PY'
          import subprocess, os
          import json as _j
          FF = "ffmpeg"
          W,H,FPS = 1920,1080,30
          RATE = 1.08   # global pace-up: every word kept, whole film 8% brisker
          # clips that render dark/moody get a lift so lighting reads consistent
          DARK = {"noise_scroll","noise_off","seat_light","capsules_macro","doors_light","oximeter_data"}
          os.makedirs("seg", exist_ok=True)
          FRA, INT = "fonts/Fraunces.ttf", "fonts/Inter.ttf"

          # sentence-level transcript drives the pause razor + captions
          _tr = _j.load(open("analysis/courtney_transcript.json"))
          TSEG = _tr if isinstance(_tr, list) else _tr.get("segments", [])
          TSEG = sorted([t for t in TSEG if t.get("text","").strip()], key=lambda s: s["start"])
          SRCMAP = {}   # seg idx -> list of (source_start, source_dur) razored sub-ranges

          HERVF = f"scale={W}:{H},fps={FPS},colorbalance=rh=.04:gh=.02:bs=-.04,eq=contrast=1.06:saturation=1.02,vignette=PI/5,noise=alls=4:allf=t+u,setpts=PTS/{RATE}"

          def sent_ranges(ss, ee):
              # razor internal thinking-pauses > 0.55s, keep 0.18s handles
              sel = [t for t in TSEG if t["end"] > ss + 0.05 and t["start"] < ee - 0.05]
              if not sel: return [(ss, ee)]
              ranges, cs = [], ss
              for a, b in zip(sel, sel[1:]):
                  if b["start"] - a["end"] > 0.40:
                      ranges.append((cs, min(a["end"] + 0.14, ee)))
                      cs = max(b["start"] - 0.12, ss)
              ranges.append((cs, ee))
              return [(s0, s1) for s0, s1 in ranges if s1 - s0 > 0.2]

          def her(idx, ss, dur):
              subs = sent_ranges(ss, ss + dur)
              parts = []
              for j,(s0,s1) in enumerate(subs):
                  p = f"seg/{idx:02d}_{j}.mp4"
                  subprocess.run([FF,"-y","-ss",f"{s0:.3f}","-t",f"{s1-s0:.3f}","-i","work/base.mp4",
                    "-vf",HERVF,"-af",f"atempo={RATE}","-c:v","libx264","-crf","17","-preset","fast",
                    "-c:a","aac","-ar","48000","-ac","2",p],check=True)
                  parts.append((p,s0,s1))
              with open(f"seg/{idx:02d}.txt","w") as f:
                  for p,_,_ in parts: f.write(f"file '{p.split('/')[-1]}'\n")
              subprocess.run([FF,"-y","-f","concat","-safe","0","-i",f"seg/{idx:02d}.txt",
                  "-c","copy",f"seg/{idx:02d}.mp4"],check=True)
              TL.append(round(sum(s1-s0 for _,s0,s1 in parts)/RATE, 4))
              SRCMAP[idx] = [(s0, s1-s0) for _,s0,s1 in parts]

          def broll(idx, clip, dur, a_ss, a_dur_off):
              eff = round(dur/RATE, 4)
              TL.append(eff)
              SRCMAP[idx] = [(a_ss+a_dur_off, dur)]
              lift = ",eq=gamma=1.30:brightness=0.06" if clip in DARK else ""
              # b-roll visual + HER AUDIO underneath (audio from base at a_ss+a_dur_off, sped RATE)
              subprocess.run([FF,"-y","-stream_loop","-1","-t",str(eff),"-i",f"work/{clip}.mp4",
                "-ss",str(a_ss+a_dur_off),"-t",str(dur),"-i","work/base.mp4",
                "-map","0:v","-map","1:a","-vf",f"scale={W}:{H}:force_original_aspect_ratio=increase:flags=lanczos,crop={W}:{H},fps={FPS},cas=0.45,unsharp=5:5:0.5,curves=preset=medium_contrast,colorbalance=rh=.05:gh=.02:bh=-.05:bs=-.05:rs=.02,eq=saturation=0.94:contrast=1.05{lift},vignette=PI/4.5,noise=alls=7:allf=t+u",
                "-af",f"atempo={RATE}",
                "-c:v","libx264","-crf","17","-preset","fast","-c:a","aac","-ar","48000","-ac","2",
                f"seg/{idx:02d}.mp4"],check=True)

          def cardseg(idx, png, dur):
              CARD_IDX.append(idx)
              TL.append(dur)
              cid = png.split("/")[-1].replace("_h.png","").replace(".png","")
              anim = f"work/anim_{cid}_h.mp4"
              if os.path.exists(anim):
                  subprocess.run([FF,"-y","-t",str(dur),"-i",anim,
                    "-f","lavfi","-t",str(dur),"-i","anullsrc=r=48000:cl=stereo",
                    "-vf",f"scale={W}:{H},fps={FPS}","-c:v","libx264","-crf","17","-preset","fast",
                    "-c:a","aac","-shortest",f"seg/{idx:02d}.mp4"],check=True)
              else:
                  subprocess.run([FF,"-y","-loop","1","-t",str(dur),"-i",png,
                    "-f","lavfi","-t",str(dur),"-i","anullsrc=r=48000:cl=stereo",
                    "-vf",f"scale={W}:{H},fps={FPS}","-c:v","libx264","-crf","17","-preset","fast",
                    "-c:a","aac","-shortest",f"seg/{idx:02d}.mp4"],check=True)

          i=0
          TL = []      # planned duration per segment, in order
          CARD_IDX = []  # explicit card segment indices — never guess from durations
          MARKS = {}   # named emotional beats -> timeline seconds
          def mark(name): MARKS[name] = sum(TL)
          def nx():
              global i; i+=1; return i

          # ===== FULL MONOLOGUE - FA measured grammar (b-roll singles on her words) =====
          # 0 · OPENER: 5s logo in neon frame, music-forward
          cardseg(nx(), "production/cards/png/horizontal/open_h.png", 5.0)
          # A · HOOK + TURN (her full text 37.4-69.68)
          her(nx(), 37.4, 6.24)                                   # "a thousand voices"
          broll(nx(), "noise_scroll", 5.28, 37.4, 6.24)           # "every influencer...contradicting"
          broll(nx(), "capsules_macro", 2.28, 37.4, 11.52)        # "all quietly selling"
          her(nx(), 51.2, 2.64)                                   # "No wonder you're overwhelmed"
          mark("breath")
          her(nx(), 53.84, 2.2)                                   # "Take a breath"
          broll(nx(), "noise_off", 2.16, 53.84, 2.2)              # "put the noise down"
          broll(nx(), "path_dawn", 3.96, 53.84, 4.36)             # "the direct path to longevity"
          her(nx(), 62.16, 7.52)                                  # "calmly...walk you through it"
          cardseg(nx(), "production/cards/png/horizontal/cta1_h.png", 2.8)
          # B · NOT YOUR FAULT (74.28-102.8, full incl. furniture line)
          her(nx(), 74.28, 7.88)                                  # "why it never stuck...whole picture"
          broll(nx(), "oximeter_data", 2.6, 74.28, 7.88)          # "fragments, one gadget at a time" - AN ACTUAL GADGET
          her(nx(), 84.76, 2.96)                                  # back on her - rhythm cut
          her(nx(), 87.72, 6.28)                                  # furniture + "didn't lack willpower"
          her(nx(), 94.0, 2.68)                                   # "you lacked a clear path"
          broll(nx(), "path_dawn", 3.2, 94.0, 2.68)               # "one you could truly follow"
          her(nx(), 99.88, 2.92)                                  # "that path can be taught" - HER FACE, teaching
          cardseg(nx(), "production/cards/png/horizontal/cta2_h.png", 2.8)
          # C · SIX PILLARS (127.34-161.8, take 2 full; singles land on her words)
          her(nx(), 127.34, 7.74)                                 # "whole path...real curriculum"
          her(nx(), 135.08, 1.12)                                 # "not a pile of tips,"
          broll(nx(), "site_nutrition", 1.3, 135.08, 1.12)        # "nutrition"
          broll(nx(), "site_sleep", 1.4, 135.08, 2.42)            # "sleep"
          broll(nx(), "site_yoga", 1.58, 135.08, 3.82)            # "movement"
          broll(nx(), "site_supplements", 2.16, 140.48, 0.0)      # "strategic supplementation"
          broll(nx(), "site_coldplunge", 1.56, 142.64, 0.0)       # "protect your heart"
          broll(nx(), "site_wearables", 2.68, 144.2, 0.0)         # "understand your numbers"
          her(nx(), 146.88, 7.48)                                 # "master them in order...sequenced"
          broll(nx(), "site_protocol", 3.16, 154.36, 0.0)         # "18 lessons week by week"
          her(nx(), 157.52, 4.28)                                 # "your tailored longevity blueprint"
          # D · PROOF (165.64-190.76 full)
          her(nx(), 165.64, 4.76)                                 # "not opinions or trend of the month"
          broll(nx(), "data_curve", 3.76, 165.64, 4.76)           # "Harvard checked 120,000 adults"
          mark("harvard0")
          her(nx(), 174.16, 9.12)                                 # "five habits...14 extra years" - HER FACE
          mark("harvard1")
          her(nx(), 183.28, 2.72)                                 # "science did the hard part" - stays on her, conviction
          her(nx(), 186.0, 4.76)                                  # "our whole job is to teach you"
          # E · OFFER (195.36-222.16 full)
          her(nx(), 195.36, 9.56)                                 # "That's exactly what LLA is..."
          broll(nx(), "site_ctabg", 3.12, 195.36, 9.56)           # "18 live sessions raise your hand"
          her(nx(), 208.04, 4.92)                                 # "real coaching meets you where you are"
          broll(nx(), "site_wearables", 3.44, 208.04, 4.92)       # "your own numbers turned into" - NUMBERS ON A WRIST
          her(nx(), 216.4, 5.76)                                  # "a personal protocol...walks the path with you"
          cardseg(nx(), "production/cards/png/horizontal/cta3_h.png", 2.8)
          # F · CLOSE (take 4 full 378.48-402.32)
          her(nx(), 378.48, 15.92)                                # "honest truth...while you walk it"
          mark("classlift")
          broll(nx(), "seat_light", 3.56, 378.48, 15.92)          # "Class is in session...a seat for you"
          her(nx(), 397.96, 4.36)                                 # "I'm Courtney. This is LLA."
          cardseg(nx(), "production/cards/png/horizontal/outro_h.png", 5.0)

          with open("list.txt","w") as f:
              for k in range(1, i+1):
                  f.write(f"file 'seg/{k:02d}.mp4'\n")
          subprocess.run([FF,"-y","-f","concat","-safe","0","-i","list.txt",
              "-c:v","libx264","-crf","17","-preset","medium","-pix_fmt","yuv420p",
              "-c:a","aac","-b:a","256k","cut.mp4"],check=True)
          # durations -> card times for the music envelope
          import json as _json
          def dur(p):
              return float(subprocess.run(["ffprobe","-v","error","-show_entries","format=duration",
                  "-of","csv=p=0",p],capture_output=True,text=True).stdout.strip())
          T = dur("cut.mp4")
          segd = [dur(f"seg/{k:02d}.mp4") for k in range(1, i+1)]
          starts = []
          acc = 0.0
          for d in segd: starts.append(acc); acc += d
          # cards are the EXPLICITLY recorded cardseg indices (duration-matching
          # previously false-positived on ~3s b-roll and misplaced stings)
          card_ts = [starts[k-1] for k in CARD_IDX]
          print("card times:", card_ts, "total:", T)
          fades = f"fade=t=in:st=0:d=0.5,fade=t=out:st={T-0.8:.2f}:d=0.8"
          import os as _os

          # ===== LARGE CAPTIONS (.ass, brand-styled) + MASTERCLASS HEADLINES =====
          def a_time(t):
              return f"{int(t//3600)}:{int(t%3600//60):02d}:{t%60:05.2f}"
          def make_ass(fname, seglist, starts_list):
              ev = []
              for pos,k in enumerate(seglist):
                  out0 = starts_list[pos]; acc = 0.0
                  for (a0,d) in SRCMAP.get(k, []):
                      a1 = a0 + d
                      for t in TSEG:
                          if t["end"] <= a0+0.03 or t["start"] >= a1-0.03: continue
                          st = out0 + acc + max(0.0, t["start"]-a0)/RATE
                          en = out0 + acc + min(d, t["end"]-a0)/RATE
                          txt = t["text"].strip()
                          for pre in ("Okay. So ","Okay. ","Okay, ","Okay so "):
                              if txt.startswith(pre): txt = txt[len(pre):]; break
                          if txt.lower().rstrip(".") == "okay" or not txt: continue
                          txt = txt[0].upper() + txt[1:]
                          if en-st > 0.25: ev.append([st,min(en,st+6.0),txt])
                      acc += d/RATE
              ev.sort()
              merged = []
              for st,en,tx in ev:
                  if merged and merged[-1][2]==tx and st-merged[-1][1] < 0.4: merged[-1][1]=en
                  else: merged.append([st,en,tx])
              with open(fname,"w") as f:
                  f.write("[Script Info]\nPlayResX: 1920\nPlayResY: 1080\nWrapStyle: 0\n\n")
                  f.write("[V4+ Styles]\nFormat: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n")
                  f.write("Style: Cap,Inter,60,&H00FFFFFF,&H00FFFFFF,&H00481F0E,&H96000000,-1,0,0,0,100,100,0,0,1,3,1,2,90,90,84,1\n\n")
                  f.write("[Events]\nFormat: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n")
                  for st,en,tx in merged:
                      tx = tx.replace("{","(").replace("}",")")
                      f.write(f"Dialogue: 0,{a_time(st)},{a_time(en)},Cap,,0,0,0,,{tx}\n")
              return fname

          HEADS = [([2],"THE PROBLEM","The noise ends here."),
                   ([11,14],"THE TRUTH","It was never your fault."),
                   ([19,20],"THE METHOD","Six pillars. One path."),
                   ([30,32],"THE PROOF","Harvard. 14 more healthy years."),
                   ([35],"THE ACADEMY","18 live sessions. Real coaching."),
                   ([41,42,43],"ENROLL NOW","Class is in session.")]
          def head_filters(seglist, starts_list):
              fs = []
              for cands,kick,text in HEADS:
                  seg = next((c for c in cands if c in seglist), None)
                  if seg is None: continue
                  t0 = starts_list[seglist.index(seg)] + 0.2; t1 = t0 + 2.7
                  al = f"if(lt(t,{t0+0.35:.2f}),(t-{t0:.2f})/0.35,if(gt(t,{t1-0.35:.2f}),({t1:.2f}-t)/0.35,1))"
                  en = f"between(t,{t0:.2f},{t1:.2f})"
                  fs.append(f"drawtext=fontfile={INT}:text='{kick}':fontcolor=0x63D3C1:fontsize=34:x=(w-text_w)/2:y=h-388:alpha='{al}':enable='{en}':shadowcolor=black@0.6:shadowx=2:shadowy=2")
                  fs.append(f"drawtext=fontfile={FRA}:text='{text}':fontcolor=0xF5F2EA:fontsize=94:x=(w-text_w)/2:y=h-344:alpha='{al}':enable='{en}':shadowcolor=black@0.7:shadowx=3:shadowy=3")
              return fs

          ALLSEGS = list(range(1, i+1))
          mcap = make_ass("cap_master.ass", ALLSEGS, starts)
          vchain = ",".join(head_filters(ALLSEGS, starts) + [f"subtitles={mcap}:fontsdir=fonts", fades])
          BED = "work/fa_bed.m4a" if _os.path.exists("work/fa_bed.m4a") else "work/bed.mp3"
          if _os.path.exists(BED):
              # opener card sits at t=0: music-forward there, settles when she speaks
              open_t = card_ts[0] if card_ts and card_ts[0] < 1.0 else None
              cards_main = [t for t in card_ts if t >= 1.0]
              c1,c2,c3,c4 = (cards_main + [20,50,75,85])[:4]
              # keyframed envelope with 0.5s linear ramps (an editor's fader, not a switch)
              br = MARKS.get("breath", 14)
              h0 = MARKS.get("harvard0", 48); h1 = MARKS.get("harvard1", 58)
              cl = MARKS.get("classlift", T-12)
              head = [(0,0.62),(4.5,0.62),(5.6,0.36)] if open_t is not None else [(0,0.36)]
              keys = head + [(br-0.4,0.30),(br+0.3,0.10),(br+2.8,0.14),          # music PRESENT from frame one; breath still dips
                      (c1-0.6,0.42),(c1,0.58),(c1+2.4,0.58),(c1+3.0,0.26),       # promise card swell
                      (c2-0.6,0.32),(c2,0.58),(c2+2.4,0.58),(c2+3.0,0.26),       # blueprint card swell
                      (h0-0.3,0.26),(h0+0.4,0.12),(h1-0.2,0.12),(h1+0.8,0.28),   # Harvard number lands drier
                      (c3-1.6,0.22),(c3-1.1,0.04),(c3-0.05,0.04),(c3,0.62),(c3+2.6,0.62),  # offer silence -> hit
                      (cl-0.3,0.28),(cl,0.42),                                    # "Class is in session" lift
                      (c4-4.5,0.46),(c4-0.4,0.58),(c4,0.74),(T,0.74)]             # FINAL CULMINATION: builds through the close, peaks on outro
              expr = f"{keys[-1][1]:.3f}"
              for (t0,v0),(t1,v1) in reversed(list(zip(keys, keys[1:]))):
                  seg_expr = f"({v0:.3f}+({v1:.3f}-{v0:.3f})*(t-{t0:.2f})/{max(t1-t0,0.01):.2f})"
                  expr = f"if(lt(t,{t1:.2f}),{seg_expr},{expr})"
              env = f"volume='{expr}':eval=frame"
              sting = _os.path.exists("work/fa_sting.m4a")
              if sting:
                  d1,d2,d3,d4 = int(c1*1000),int(c2*1000),int(c3*1000),int(c4*1000)
                  fc = (f"[1:a]silenceremove=start_periods=1:start_threshold=-40dB,aloop=loop=-1:size=2e9,atrim=0:{T:.2f},{env},afade=t=out:st={T-1.2:.2f}:d=1.2[m];"
                        f"[2:a]asplit=4[s1][s2][s3][s4];"
                        f"[s1]adelay={d1}|{d1},volume=0.5[st1];"
                        f"[s2]adelay={d2}|{d2},volume=0.5[st2];"
                        f"[s3]adelay={d3}|{d3},volume=0.6[st3];"
                        f"[s4]adelay={d4}|{d4},volume=0.7[st4];"
                        f"[m][st1][st2][st3][st4]amix=inputs=5:duration=first:normalize=0[mm];"
                        f"[0:a][mm]amix=inputs=2:duration=first:normalize=0[aout];"
                        f"[0:v]{vchain}[vout]")
                  inputs = [FF,"-y","-i","cut.mp4","-i",BED,"-i","work/fa_sting.m4a"]
              else:
                  fc = (f"[1:a]silenceremove=start_periods=1:start_threshold=-40dB,aloop=loop=-1:size=2e9,atrim=0:{T:.2f},{env},afade=t=out:st={T-1.2:.2f}:d=1.2[m];"
                        f"[0:a][m]amix=inputs=2:duration=first:normalize=0[aout];"
                        f"[0:v]{vchain}[vout]")
                  inputs = [FF,"-y","-i","cut.mp4","-i",BED]
              subprocess.run(inputs + [
                  "-filter_complex",fc,"-map","[vout]","-map","[aout]",
                  "-c:v","libx264","-crf","17","-preset","medium","-pix_fmt","yuv420p",
                  "-c:a","aac","-b:a","256k","-movflags","+faststart",
                  "Courtney_AD90_FINAL.mp4"],check=True)
          else:
              subprocess.run([FF,"-y","-i","cut.mp4","-vf",vchain,
                  "-c:v","libx264","-crf","17","-preset","medium",
                  "-c:a","copy","-movflags","+faststart","Courtney_AD90_FINAL.mp4"],check=True)
          subprocess.run(["ffprobe","-v","error","-show_entries","format=duration,size",
              "-of","default=noprint_wrappers=1","Courtney_AD90_FINAL.mp4"])
          # measured audit
          with open("EDIT_AUDIT.md","w") as f:
              f.write("# Master edit - measured audit\n\n")
              f.write(f"Total runtime: {T:.2f}s\n\nCard times (s): {', '.join(f'{t:.2f}' for t in card_ts)}\n\n")
              f.write("| # | start | dur | type |\n|---|---|---|---|\n")
              for k,(st,d) in enumerate(zip(starts,segd),1):
                  typ = "CARD" if k in CARD_IDX else "footage/talent"
                  f.write(f"| {k} | {st:.2f} | {d:.2f} | {typ} |\n")

          # ===== SHORT CUTS: generic mixer (concat chosen segs, FA music grammar) =====
          def mixcut(outname, seglist, label):
              lst = f"{outname}.list.txt"
              with open(lst,"w") as f:
                  for k in seglist: f.write(f"file 'seg/{k:02d}.mp4'\n")
              rawname = f"{outname}.raw.mp4"
              subprocess.run([FF,"-y","-f","concat","-safe","0","-i",lst,
                  "-c:v","libx264","-crf","17","-preset","medium","-pix_fmt","yuv420p",
                  "-c:a","aac","-b:a","256k",rawname],check=True)
              CT = dur(rawname)
              cdur = [dur(f"seg/{k:02d}.mp4") for k in seglist]
              cstarts = []; cacc = 0.0
              for d in cdur: cstarts.append(cacc); cacc += d
              cards = [cstarts[j] for j,k in enumerate(seglist) if k in CARD_IDX]
              print(label, "runtime:", CT, "cards:", cards)
              # per-cut captions + headlines
              ccap = make_ass(f"{outname}.ass", seglist, cstarts)
              cfades = f"fade=t=in:st=0:d=0.4,fade=t=out:st={CT-0.7:.2f}:d=0.7"
              cvchain = ",".join(head_filters(seglist, cstarts) + [f"subtitles={ccap}:fontsdir=fonts", cfades])
              if not _os.path.exists(BED):
                  subprocess.run([FF,"-y","-i",rawname,"-vf",cvchain,"-c:v","libx264","-crf","17",
                      "-preset","medium","-pix_fmt","yuv420p","-c:a","copy",outname],check=True)
                  return CT, cards
              # envelope: present from frame one; swell on each card;
              # silence->hit on the offer card (last 2.8s card); outro rides out
              open_p = bool(cards) and cards[0] < 1.0
              body = [c for c in cards if c >= 1.0]
              short = body[:-1] if len(body)>1 else body
              outro_c = body[-1] if body else CT-4.0
              offer_c = short[-1] if short else None
              fk = [(0,0.62),(4.5,0.62),(5.6,0.38)] if open_p else [(0,0.38)]
              for c in (short[:-1] if offer_c is not None else short):
                  fk += [(c-0.6,0.44),(c,0.6),(c+2.4,0.6),(c+3.0,0.28)]
              if offer_c is not None:
                  fk += [(offer_c-1.2,0.30),(offer_c-0.7,0.04),(offer_c-0.05,0.04),
                         (offer_c,0.64),(offer_c+2.4,0.64),(offer_c+2.9,0.34)]
              fk += [(outro_c-4.5,0.46),(outro_c-0.4,0.58),(outro_c,0.74),(CT,0.74)]   # final culmination
              fk = sorted(set(fk), key=lambda x: x[0])
              fk = [k for j,k in enumerate(fk) if j==0 or k[0] > fk[j-1][0] + 0.02]
              fexpr = f"{fk[-1][1]:.3f}"
              for (t0,v0),(t1,v1) in reversed(list(zip(fk, fk[1:]))):
                  se = f"({v0:.3f}+({v1:.3f}-{v0:.3f})*(t-{t0:.2f})/{max(t1-t0,0.01):.2f})"
                  fexpr = f"if(lt(t,{t1:.2f}),{se},{fexpr})"
              fenv = f"volume='{fexpr}':eval=frame"
              stc = [c for c in body if c != outro_c][:3] + ([outro_c] if body else [])
              if _os.path.exists("work/fa_sting.m4a") and stc:
                  splits = "".join(f"[s{j}]" for j in range(len(stc)))
                  ffc = (f"[1:a]silenceremove=start_periods=1:start_threshold=-40dB,aloop=loop=-1:size=2e9,atrim=0:{CT:.2f},{fenv},afade=t=out:st={CT-1.0:.2f}:d=1.0[m];"
                         f"[2:a]asplit={len(stc)}{splits};")
                  for j,c in enumerate(stc):
                      dd = int(c*1000); vv = 0.7 if c == outro_c else (0.6 if c == offer_c else 0.5)
                      ffc += f"[s{j}]adelay={dd}|{dd},volume={vv}[st{j}];"
                  ffc += (f"[m]{''.join(f'[st{j}]' for j in range(len(stc)))}amix=inputs={len(stc)+1}:duration=first:normalize=0[mm];"
                          f"[0:a][mm]amix=inputs=2:duration=first:normalize=0[aout];"
                          f"[0:v]{cvchain}[vout]")
                  fin = [FF,"-y","-i",rawname,"-i",BED,"-i","work/fa_sting.m4a"]
              else:
                  ffc = (f"[1:a]silenceremove=start_periods=1:start_threshold=-40dB,aloop=loop=-1:size=2e9,atrim=0:{CT:.2f},{fenv},afade=t=out:st={CT-1.0:.2f}:d=1.0[m];"
                         f"[0:a][m]amix=inputs=2:duration=first:normalize=0[aout];[0:v]{cvchain}[vout]")
                  fin = [FF,"-y","-i",rawname,"-i",BED]
              subprocess.run(fin + ["-filter_complex",ffc,"-map","[vout]","-map","[aout]",
                  "-c:v","libx264","-crf","17","-preset","medium","-pix_fmt","yuv420p",
                  "-c:a","aac","-b:a","256k","-movflags","+faststart",outname],check=True)
              subprocess.run(["ffprobe","-v","error","-show_entries","format=duration,size",
                  "-of","default=noprint_wrappers=1",outname])
              return CT, cards

          # THE 90s FULL-SCRIPT CUT: every script section, sentence-boundary cuts only.
          # hook+noise -> breath/turn -> card1 -> willpower/path -> card2 ->
          # pillars run -> 18 lessons -> blueprint -> Harvard 14yrs -> LLA offer
          # "raise your hand" -> offer card -> class in session -> I'm Courtney -> outro
          # (all indices +1: seg 1 is now the 5s opener, included in every cut)
          S90 = [1, 2,3,4,5,6,7,8, 10, 14,15, 18, 20,21,22,23,24,25,26, 28,29, 32, 35,36, 40, 42,43, 44]
          T90, cards90 = mixcut("Courtney_AD90S.mp4", S90, "AD90S")

          # FA-length cut (~55s): tightest spine
          FA = [1, 2,3,4,5,6,7,8, 10, 20,21,22,23,24,25,26, 32, 40, 43, 44]
          TFA, cardsFA = mixcut("Courtney_AD55_FA.mp4", FA, "AD55")

          with open("EDIT_AUDIT.md","a") as f:
              f.write(f"\n## 90s full-script cut\n\nRuntime: {T90:.2f}s; cards at {', '.join(f'{t:.2f}' for t in cards90)}\n")
              f.write(f"\n## FA-length cut\n\nRuntime: {TFA:.2f}s; cards at {', '.join(f'{t:.2f}' for t in cardsFA)}\n")

          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Courtney_AD90_FINAL
          path: Courtney_AD90_FINAL.mp4
          if-no-files-found: error

      - name: Commit (LFS)
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          mkdir -p deliverables
          cp Courtney_AD90_FINAL.mp4 deliverables/
          cp Courtney_AD90S.mp4 deliverables/ || true
          cp Courtney_AD55_FA.mp4 deliverables/ || true
          cp EDIT_AUDIT.md production/EDIT_AUDIT.md || true
          git add deliverables/ production/EDIT_AUDIT.md
          git commit -m "ASSEMBLED v2: pace-up, brand cards, music from frame one, lit-matched footage + FA-length cut"
          for n in 1 2 3 4; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break || sleep $((2**n))
          done
