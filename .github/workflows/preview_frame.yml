name: Preview Frame (0717 new set)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg unzip python3-pip
          pip3 install --quiet "rembg[cpu]" onnxruntime pillow numpy
      - name: Source + plate
        run: |
          set -e
          mkdir -p work deliverables
          cp assets/newset_plate.jpg work/plate.jpg
          curl -L --fail --retry 5 --retry-delay 5 \
            "https://drive.usercontent.google.com/download?id=1VyhOqzO5FuHcnSRKzDpA40AK_4hJkqSQ&export=download&confirm=t" -o 0717.zip
          mkdir -p src && unzip -o 0717.zip -d src
          VID=$(find src -type f \( -iname '*.mp4' -o -iname '*.mov' -o -iname '*.webm' -o -iname '*.mkv' \) | head -1)
          ffmpeg -y -ss 60 -i "$VID" -frames:v 1 -vf "scale=1920:1080:flags=lanczos" work/frame.png
          ffmpeg -y -i work/plate.jpg -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,gblur=sigma=1.1,noise=alls=5:allf=t" -frames:v 1 work/bg.png
      - name: Composite one frame
        run: |
          python3 - <<'PY'
          import numpy as np
          from rembg import remove, new_session
          from PIL import Image, ImageFilter
          OW, OH = 1920, 1080
          sess = new_session("u2net_human_seg")
          bg = Image.open("work/bg.png").convert("RGBA")
          import numpy as _np
          _lip = bg.convert("RGB").crop((640, 918, 1280, 1080))
          _lr = _np.clip((_np.arange(162)[:,None])*5, 0, 255).astype(_np.uint8)
          _lipmask = Image.fromarray(_np.repeat(_lr, 640, axis=1), "L")
          _edge = _np.full((1080,1920), 255, _np.float32)
          _ramp = _np.linspace(0,255,70)
          _edge[:, :70] = _np.minimum(_edge[:, :70], _ramp[None,:])
          _edge[:, -70:] = _np.minimum(_edge[:, -70:], _ramp[::-1][None,:])
          _edge[:70, :] = _np.minimum(_edge[:70, :], _ramp[:,None])
          set_mean = np.asarray(bg.convert("RGB")).astype(np.float32).reshape(-1,3).mean(0) + 1e-6
          frame = Image.open("work/frame.png").convert("RGBA")
          cut = remove(frame, session=sess)
          arr = np.asarray(cut).astype(np.float32)
          rgb, alpha = arr[...,:3], arr[...,3]
          m = alpha > 8
          if m.any():
              fg_mean = rgb[m].mean(0) + 1e-6
              gain = np.clip(1.0 + (set_mean/fg_mean - 1.0)*0.6, 0.90, 1.12)
              rgb = np.clip(rgb*gain, 0, 255)
          a_img = Image.fromarray(alpha.astype(np.uint8),"L").filter(ImageFilter.MinFilter(3)).filter(ImageFilter.GaussianBlur(0.7))
          cut = Image.fromarray(np.dstack([rgb, np.asarray(a_img)[...,None].astype(np.float32)]).astype(np.uint8),"RGBA")
          r2,g2,b2,a2 = cut.split()
          a2 = Image.fromarray(_np.minimum(_np.asarray(a2), _edge).astype(_np.uint8), "L")
          cut = Image.merge("RGBA", (r2,g2,b2,a2))
          PS = 0.39
          sw, sh = int(OW*PS), int(OH*PS)
          cut_s = cut.resize((sw, sh), Image.LANCZOS)
          canvas = Image.new("RGBA",(OW,OH),(0,0,0,0))
          canvas.paste(cut_s, (961 - sw//2, 735 - sh), cut_s)
          a_small = canvas.split()[3]
          sa = a_small.filter(ImageFilter.GaussianBlur(22)).point(lambda v: int(v*0.2))
          shadow = Image.new("RGBA",(OW,OH),(0,0,0,0)); shadow.putalpha(sa)
          comp = Image.alpha_composite(bg.copy(), shadow)
          comp = Image.alpha_composite(comp, canvas).convert("RGB")
          ar = np.asarray(comp).astype(np.float32)
          ar += np.random.normal(0, 2.2, ar.shape)
          comp = Image.fromarray(np.clip(ar,0,255).astype(np.uint8))
          comp.save("deliverables/preview_newset.jpg", quality=90)
          print("saved")
          PY
      - name: Commit preview
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deliverables/preview_newset.jpg
          git commit -m "Preview frame: Courtney on new set"
          for n in 1 2 3 4; do git pull --rebase origin main && git push origin HEAD:main && break || sleep $((2**n)); done
