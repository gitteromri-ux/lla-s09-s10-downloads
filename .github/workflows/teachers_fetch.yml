name: Teachers edit - fetch video and live teachers page

on:
  workflow_dispatch:
    inputs:
      drive_id:
        description: "Google Drive file id of the source video"
        required: true
      site:
        description: "Site URL"
        required: false
        default: "https://www.longevitylifeacademy.com"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Download source video from Drive
        env:
          DRIVE_ID: ${{ github.event.inputs.drive_id }}
        run: |
          set -e
          mkdir -p deliverables/source
          curl -sL --max-time 300 "https://drive.usercontent.google.com/download?id=${DRIVE_ID}&export=download&confirm=t" -o deliverables/source/ADD-1.mp4
          file deliverables/source/ADD-1.mp4
          ls -la deliverables/source
          # sanity: must be an mp4, not an html interstitial
          file -b --mime-type deliverables/source/ADD-1.mp4 | grep -q video || { pip install -q gdown; gdown -q "$DRIVE_ID" -O deliverables/source/ADD-1.mp4; }
          file deliverables/source/ADD-1.mp4
      - name: Screenshot live teachers page with real browser
        env:
          SITE: ${{ github.event.inputs.site }}
        run: |
          set -e
          mkdir -p analysis/teachers
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund playwright-core >/dev/null 2>&1
          cat > shot.mjs <<'EOF'
          import { chromium } from 'playwright-core';
          import fs from 'fs';

          const SITE = process.env.SITE || 'https://www.longevitylifeacademy.com';
          const browser = await chromium.launch({ channel: 'chrome', headless: true });
          const page = await browser.newPage({ viewport: { width: 1920, height: 1080 }, deviceScaleFactor: 1 });

          async function settle(p) {
            await p.waitForLoadState('domcontentloaded');
            await p.waitForTimeout(4000);
            // scroll through to trigger lazy loading
            await p.evaluate(async () => {
              const h = document.body.scrollHeight;
              for (let y = 0; y < h; y += 600) { window.scrollTo(0, y); await new Promise(r => setTimeout(r, 120)); }
              window.scrollTo(0, 0);
            });
            await p.waitForTimeout(2500);
          }

          await page.goto(SITE, { timeout: 60000 });
          await settle(page);
          fs.writeFileSync('analysis/teachers/home.html', await page.content());
          await page.screenshot({ path: 'analysis/teachers/home_full.png', fullPage: true });

          // find a teachers link
          const links = await page.evaluate(() =>
            [...document.querySelectorAll('a')].map(a => ({ href: a.href, text: (a.textContent || '').trim() }))
          );
          fs.writeFileSync('analysis/teachers/links.json', JSON.stringify(links, null, 2));
          const t = links.find(l => /teacher/i.test(l.text) || /teacher/i.test(l.href))
                 || links.find(l => /instructor|team|faculty/i.test(l.text + l.href));

          let where = 'home';
          if (t && t.href && !t.href.startsWith(SITE + '/#') && t.href !== SITE + '/') {
            await page.goto(t.href, { timeout: 60000 });
            await settle(page);
            where = t.href;
            fs.writeFileSync('analysis/teachers/teachers.html', await page.content());
          }
          await page.screenshot({ path: 'analysis/teachers/teachers_full.png', fullPage: true });

          // bounding boxes (full-page coords) for Julie and surrounding section
          const boxes = await page.evaluate(() => {
            const out = { pageWidth: document.documentElement.scrollWidth, pageHeight: document.body.scrollHeight, julie: null, julieCard: null, section: null, names: [] };
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);
            const abs = el => { const r = el.getBoundingClientRect(); return { x: r.x + window.scrollX, y: r.y + window.scrollY, w: r.width, h: r.height }; };
            for (const n of nodes) {
              const txt = (n.textContent || '').trim();
              if (/julie\s*gibson\s*clark/i.test(txt)) {
                const el = n.parentElement;
                out.julie = { text: txt, box: abs(el) };
                // walk up to a card-ish ancestor
                let card = el, hops = 0;
                while (card.parentElement && hops < 8) {
                  const b = card.parentElement.getBoundingClientRect();
                  if (b.width > 600 || b.height > 900) break;
                  card = card.parentElement; hops++;
                }
                out.julieCard = abs(card);
                let sec = el.closest('section') || el.closest('[data-hook]') || el.closest('div');
                if (sec) out.section = abs(sec);
              }
              if (txt.length > 4 && txt.length < 60 && /^[A-Z][a-z]+(\s+[A-Z][a-zA-Z.'-]+){1,3}$/.test(txt)) {
                out.names.push({ text: txt, box: abs(n.parentElement) });
              }
            }
            return out;
          });
          fs.writeFileSync('analysis/teachers/boxes.json', JSON.stringify(boxes, null, 2));
          console.log('where:', where);
          console.log(JSON.stringify(boxes.julie), JSON.stringify(boxes.julieCard));
          await browser.close();
          EOF
          node shot.mjs
          rm -rf node_modules package.json package-lock.json shot.mjs
          ls -la analysis/teachers
      - name: Commit to dispatch branch
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git add deliverables/source analysis/teachers
          git commit -m "Teachers edit: source video + live teachers page capture" || echo nothing
          for n in 1 2 3 4; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break || sleep $((2**n))
          done
