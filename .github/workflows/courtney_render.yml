name: Courtney New-Set Composite Stream

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip python3-pip
          pip3 install --quiet "rembg[cpu]" onnxruntime pillow numpy

      - name: Download 0717.zip from Drive
        run: |
          set -e
          curl -L --fail --retry 5 --retry-delay 5 \
            "https://drive.usercontent.google.com/download?id=1VyhOqzO5FuHcnSRKzDpA40AK_4hJkqSQ&export=download&confirm=t" \
            -o 0717.zip
          mkdir -p src && unzip -o 0717.zip -d src
          ls -la src

      - name: Extract audio + prep background
        run: |
          set -e
          mkdir -p work out
          ffmpeg -y -i src/0717.mp4 -vn -c:a aac -b:a 192k work/audio.m4a
          ffmpeg -y -i assets/set_cover.jpg -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" work/bg.png

      - name: Streaming segment + composite + encode
        run: |
          set -e
          cat > stream.py <<'PY'
          import subprocess, numpy as np
          from rembg import remove, new_session
          from PIL import Image
          W,H,FPS = 1280,720,30
          sess = new_session("u2net_human_seg")
          bg = Image.open("work/bg.png").convert("RGBA")

          dec = subprocess.Popen(
              ["ffmpeg","-i","src/0717.mp4","-vf",f"scale={W}:{H}:flags=bilinear","-r",str(FPS),
               "-f","rawvideo","-pix_fmt","rgb24","-"],
              stdout=subprocess.PIPE, stderr=subprocess.DEVNULL)

          enc = subprocess.Popen(
              ["ffmpeg","-y","-f","rawvideo","-pix_fmt","rgb24","-s",f"{W}x{H}","-r",str(FPS),"-i","-",
               "-vf","scale=1920:1080:flags=lanczos",
               "-c:v","libx264","-preset","veryfast","-crf","20","-pix_fmt","yuv420p",
               "work/video_noaudio.mp4"],
              stdin=subprocess.PIPE, stderr=subprocess.DEVNULL)

          fsize = W*H*3
          i = 0
          while True:
              raw = dec.stdout.read(fsize)
              if len(raw) < fsize: break
              frame = Image.frombytes("RGB",(W,H),raw).convert("RGBA")
              cut = remove(frame, session=sess)
              comp = Image.alpha_composite(bg.copy(), cut).convert("RGB")
              enc.stdin.write(comp.tobytes())
              i += 1
              if i % 300 == 0: print("frames", i, flush=True)
          enc.stdin.close(); enc.wait(); dec.wait()
          print("TOTAL FRAMES", i, flush=True)
          PY
          python3 stream.py
          # mux original audio
          ffmpeg -y -i work/video_noaudio.mp4 -i work/audio.m4a \
            -c:v copy -c:a aac -b:a 192k -shortest out/Courtney_FRONT_NEWSET_0717.mp4
          ls -la out

      - name: Commit result (git LFS)
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git lfs track "*.mp4" || true
          mkdir -p deliverables
          cp out/Courtney_FRONT_NEWSET_0717.mp4 deliverables/
          git add .gitattributes deliverables/Courtney_FRONT_NEWSET_0717.mp4
          git commit -m "Render: Courtney front on new library set (0717, streamed, 1080p out)" || echo "nothing to commit"
          git push origin main
