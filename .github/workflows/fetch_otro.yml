name: Fetch OTRO videos from Drive

on:
  workflow_dispatch:
  push:
    branches:
      - claude/design-video-file-access-0y4n0e
    paths:
      - '.github/workflows/fetch_otro.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Download OTRO videos from Google Drive
        run: |
          set -e
          mkdir -p otro
          dl() {
            curl -sL "https://drive.usercontent.google.com/download?id=$1&export=download&confirm=t" -o "otro/$2"
            t=$(file -b "otro/$2")
            s=$(stat -c%s "otro/$2")
            echo "otro/$2: $t ($s bytes)"
            case "$t" in
              *"ISO Media"*|*MP4*|*"MPEG v4"*) ;;
              *) echo "ERROR: otro/$2 is not a valid MP4"; head -c 500 "otro/$2"; exit 1 ;;
            esac
            [ "$s" -gt 1000000 ] || { echo "ERROR: otro/$2 too small"; exit 1; }
          }
          dl 1GUeOUezrf4XtTGHlKpWA0lS6h_duO_T7 "OTRO-1.mp4"
          dl 13R1tU_JL-7Q6TzutQ3S1RRcQaKoYPpYA "OTRO-OPE-1.mp4"
          dl 1pXi8zHnenQVyLcdNUmdmAtZvTf563VpH "OTRO-OPE-2.mp4"
          dl 1zHCtd-J5O6gGrsSodoBMaCeRPYkfCjPZ "OTRO-OPE-3.mp4"
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add otro
          git commit -m "Fetched OTRO videos from Drive" || echo nothing
          for n in 1 2 3 4; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break || sleep $((2**n))
          done
