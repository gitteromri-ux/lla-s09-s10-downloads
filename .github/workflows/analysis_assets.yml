name: Analysis assets (French Atelier refs + Courtney transcript)

# Pulls the two French Atelier reference videos, detects every cut, dumps
# scene keyframes + contact sheets, and transcribes all three videos
# (refs + Courtney BGSWAP final) with word timestamps.
# Commits everything compact under analysis/ on this branch.

on:
  workflow_dispatch:
    inputs:
      yt1:
        description: "Reference video 1 URL"
        required: true
        default: "https://youtu.be/G0lUXZKwg-8"
      yt2:
        description: "Reference video 2 URL"
        required: true
        default: "https://www.youtube.com/watch?v=z-l7f4qOmEo"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg python3-pip
          pip3 install --quiet yt-dlp faster-whisper

      - name: Fetch reference videos
        run: |
          set -e
          mkdir -p refs analysis
          fetch_yt() {
            yt-dlp -f "bv*[height<=480]+ba/b[height<=480]/b" --merge-output-format mp4 \
              --extractor-args "youtube:player_client=android,web" \
              -o "refs/$2.mp4" "$1" || \
            yt-dlp -f "b" -o "refs/$2.mp4" "$1"
            yt-dlp --dump-json --no-download "$1" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          keep={k:d.get(k) for k in ('title','duration','upload_date','description','view_count','like_count')}
          json.dump(keep, open('analysis/$2_meta.json','w'), indent=1, ensure_ascii=False)" || true
          }
          fetch_yt "${{ github.event.inputs.yt1 }}" ref1
          fetch_yt "${{ github.event.inputs.yt2 }}" ref2
          ls -la refs

      - name: Cut detection + contact sheets
        run: |
          set -e
          for R in ref1 ref2; do
            # cut timestamps
            ffmpeg -i "refs/$R.mp4" -vf "select='gt(scene,0.28)',showinfo" -f null - 2>&1 | \
              grep showinfo | grep -oE 'pts_time:[0-9.]+' | cut -d: -f2 > "analysis/${R}_cuts.txt" || true
            wc -l "analysis/${R}_cuts.txt"
            # scene keyframes -> tiled contact sheets (6x5 = 30 scenes per sheet)
            mkdir -p "sc_$R"
            ffmpeg -i "refs/$R.mp4" -vf "select='gt(scene,0.28)',scale=320:180" -vsync vfr "sc_$R/s%03d.png" 2>/dev/null || true
            N=$(ls sc_$R | wc -l); echo "$R scenes: $N"
            ffmpeg -pattern_type glob -i "sc_$R/s*.png" -vf "tile=6x5" "analysis/${R}_sheet%d.png" 2>/dev/null || true
            # uniform timeline strip: 1 frame every 2s
            ffmpeg -i "refs/$R.mp4" -vf "fps=0.5,scale=320:180,tile=6x8" "analysis/${R}_timeline%d.png" 2>/dev/null || true
          done
          ls -la analysis

      - name: Get Courtney final + transcribe all three
        run: |
          set -e
          curl -sL --fail "https://media.githubusercontent.com/media/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/deliverables/Courtney_BGSWAP_0717.mp4" -o refs/courtney.mp4
          python3 - <<'PY'
          from faster_whisper import WhisperModel
          import json
          model = WhisperModel("small", device="cpu", compute_type="int8")
          for name in ("ref1","ref2","courtney"):
              try:
                  segs, info = model.transcribe(f"refs/{name}.mp4", word_timestamps=False)
                  out = []
                  txt = []
                  for s in segs:
                      out.append({"start": round(s.start,2), "end": round(s.end,2), "text": s.text.strip()})
                      txt.append(f"[{int(s.start//60)}:{int(s.start%60):02d}] {s.text.strip()}")
                  json.dump(out, open(f"analysis/{name}_transcript.json","w"), indent=1, ensure_ascii=False)
                  open(f"analysis/{name}_transcript.txt","w").write("\n".join(txt))
                  print(name, "segments:", len(out), "lang:", info.language)
              except Exception as e:
                  print(name, "FAILED:", e)
                  open(f"analysis/{name}_transcript.txt","w").write(f"TRANSCRIPTION FAILED: {e}")
          PY
          ls -la analysis

      - name: Commit analysis assets
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add analysis/
          git commit -m "Analysis assets: ref cut maps, contact sheets, transcripts (refs + Courtney)" || echo "nothing to commit"
          for n in 1 2 3 4; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break || sleep $((2**n))
          done
