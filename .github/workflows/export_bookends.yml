name: Export standalone intro + outro

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Build bookends
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          TS=$(date +%s)
          M="https://media.githubusercontent.com/media/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}"
          mkdir -p work deliverables/bookends
          curl -sL --fail "$M/production/footage/clips/intro_src.mp4?nc=$TS" -o work/intro_src.mp4
          curl -sL --fail "$M/production/footage/clips/outro_src.mp4?nc=$TS" -o work/outro_src.mp4
          curl -sL --fail "$M/production/cards/anim/outro_h.mp4?nc=$TS" -o work/card.mp4
          curl -sL --fail "$M/production/music/fa_sting.m4a" -o work/fa_sting.m4a || true

          # INTRO: Est.2000 removed, official blue eTeacher strip composited, own audio
          ffmpeg -y -i assets/lla-logo-transparent@2x.png -vf "crop=760:140:530:443,scale=-1:64" work/strip.png
          ffmpeg -y -i work/intro_src.mp4 -i work/strip.png -filter_complex \
            "[0:v]scale=1920:1080,fps=30,delogo=x=845:y=283:w=235:h=62,delogo=x=838:y=726:w=246:h=64[v0];[v0][1:v]overlay=(W-w)/2:728[v]" \
            -map "[v]" -map 0:a -c:v libx264 -crf 16 -preset medium -pix_fmt yuv420p \
            -c:a aac -b:a 256k -movflags +faststart deliverables/bookends/LLA_INTRO_FINAL.mp4

          # OUTRO v4: ORIGINAL video + ORIGINAL pace. Video cuts away right before
          # the Abbott unboxing; the ORIGINAL MUSIC KEEPS PLAYING over the ending card
          # and fades at its natural end. Laptop scene untouched.
          SC=$(ffmpeg -i work/outro_src.mp4 -vf "select='gt(scene,0.28)',metadata=print" -f null - 2>&1 \
                | grep -oE "pts_time:[0-9.]+" | cut -d: -f2)
          S2=$(echo "$SC" | awk '$1>=4.5 && $1<=4.98 {print; exit}'); [ -z "$S2" ] && S2=4.70
          S2=$(python3 -c "print(max(4.4, float('$S2') - 0.04))")
          echo "video cuts to card at: $S2 (audio continues)"
          ffmpeg -y -to "$S2" -i work/outro_src.mp4 -an -vf "scale=1920:1080,fps=30" \
            -c:v libx264 -crf 16 -preset medium -pix_fmt yuv420p work/ovv.mp4
          ffmpeg -y -t 3.5 -i work/card.mp4 -an -vf "scale=1920:1080,fps=30" \
            -c:v libx264 -crf 16 -preset medium -pix_fmt yuv420p work/cardv.mp4
          printf "file 'ovv.mp4'\nfile 'cardv.mp4'\n" > work/cc.txt
          ffmpeg -y -f concat -safe 0 -i work/cc.txt -c copy work/full_v.mp4
          AD=$(ffprobe -v error -show_entries format=duration -of csv=p=0 work/outro_src.mp4)
          FST=$(python3 -c "print(max(0.5, float('$AD') - 0.6))")
          ffmpeg -y -i work/full_v.mp4 -i work/outro_src.mp4 -filter_complex \
            "[1:a]aresample=48000,afade=t=out:st=${FST}:d=0.6,apad[a]" \
            -map 0:v -map "[a]" -shortest -c:v copy -c:a aac -b:a 256k \
            -movflags +faststart deliverables/bookends/LLA_OUTRO_FINAL.mp4
          # films reuse: same video cut with its own audio to S2
          ffmpeg -y -to "$S2" -i work/outro_src.mp4 -vf "scale=1920:1080,fps=30" \
            -c:v libx264 -crf 16 -preset medium -c:a aac -ar 48000 -ac 2 production/footage/clips/outro_proc.mp4
          ffprobe -v error -show_entries format=duration -of csv=p=0 deliverables/bookends/LLA_INTRO_FINAL.mp4
          ffprobe -v error -show_entries format=duration -of csv=p=0 deliverables/bookends/LLA_OUTRO_FINAL.mp4
      - name: Commit
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git lfs track "*.mp4" >/dev/null 2>&1 || true
          git add deliverables/bookends production/footage/clips/outro_proc.mp4
          git commit -m "Standalone bookends: processed intro + outro sequence"
          for n in 1 2 3 4; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break || sleep $((2**n))
          done
