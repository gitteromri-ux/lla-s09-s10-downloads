name: Proof frame v3 (Higgsfield set, machine-measured fit)

# One frame of real Courtney composited into the Higgsfield keyframe set.
# Scale/position are MEASURED by AI segmentation (rembg) on both the
# generated keyframe and the real video frame - not eyeballed.
#   base   = assets/keyframe_final.png  (her AI-placed body defines exact fit)
#   talent = real video frame, matted, aligned over the AI body with margin
#   seam   = bottom fade into the matching lap/legs region

on:
  workflow_dispatch:
    inputs:
      t:
        description: "Timestamp (seconds) of the proof frame"
        required: false
        default: "60"
      margin_scale:
        description: "Oversize factor so real head fully covers AI head"
        required: false
        default: "1.05"

permissions:
  contents: write

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg unzip python3-pip
          pip3 install --quiet "rembg[cpu]" onnxruntime pillow numpy

      - name: Get source video + extract frame
        run: |
          set -e
          curl -L --fail --retry 5 --retry-delay 5 \
            "https://drive.usercontent.google.com/download?id=1VyhOqzO5FuHcnSRKzDpA40AK_4hJkqSQ&export=download&confirm=t" -o 0717.zip
          mkdir -p src work
          unzip -o -q 0717.zip -d src
          VID=$(find src -type f \( -iname '*.mp4' -o -iname '*.mov' -o -iname '*.webm' \) | head -1)
          ffmpeg -y -ss "${{ github.event.inputs.t }}" -i "$VID" -frames:v 1 -vf scale=1920:1080:flags=lanczos work/src_frame.png

      - name: Measure + composite
        run: |
          set -e
          python3 <<'PY'
          import numpy as np
          from rembg import remove, new_session
          from PIL import Image, ImageFilter

          sess = new_session("u2net_human_seg")
          W,H = 1920,1080
          MARGIN = float("${{ github.event.inputs.margin_scale }}")

          def person_mask(img, xlo=0, xhi=W, alpha_thr=60):
              cut = remove(img.convert("RGBA"), session=sess)
              a = np.asarray(cut)[...,3]
              m = a > alpha_thr
              mm = np.zeros_like(m); mm[:, xlo:xhi] = m[:, xlo:xhi]
              return cut, mm

          def head_of(mm):
              rows = np.where(mm.sum(1) > 12)[0]
              top = int(rows.min())
              band = mm[top+12:top+72]
              cols = np.where(band.sum(0) > 6)[0]
              return top, int(cols.max()-cols.min()), (int(cols.min())+int(cols.max()))//2

          def shoulder_cx(mm, top, r0, r1):
              band = mm[top+r0:top+r1]
              ys, xs = np.nonzero(band)
              return int(xs.mean())

          key = Image.open("assets/keyframe_final.png").convert("RGB").resize((W,H), Image.LANCZOS)
          _, kmask = person_mask(key, xlo=600, xhi=1400)
          kt, kw, kcx = head_of(kmask)

          srcf = Image.open("work/src_frame.png").convert("RGB")
          cut, smask = person_mask(srcf)
          st, sw_, scx = head_of(smask)

          PS = MARGIN * kw / sw_
          sw, sh = int(W*PS), int(H*PS)
          # align torso (shoulder centroid), not head axis
          s_sh = shoulder_cx(smask, st, 150, 260)
          k_sh = shoulder_cx(kmask, kt, int(150*PS), int(260*PS))
          paste_top = int(kt - PS*st - 8)
          paste_left = int(k_sh - PS*s_sh)
          CX = paste_left + sw//2
          WY = paste_top + sh
          print(f"MEASURE key: head_top={kt} w={kw} cx={kcx} sh_cx={k_sh}")
          print(f"MEASURE src: head_top={st} w={sw_} cx={scx} sh_cx={s_sh}")
          print(f"PARAMS PS={PS:.4f} CX={CX} WY={WY} paste_top={paste_top}")

          # color match talent to set light
          arr = np.asarray(cut).astype(np.float32)
          rgb, a = arr[...,:3], arr[...,3]
          bgm = np.asarray(key).reshape(-1,3).mean(0)
          sel = a > 8
          gain = 1.0 + ((bgm / (rgb[sel].mean(0)+1e-6)) - 1.0) * 0.5
          gain = np.clip(gain, 0.90, 1.12)
          rgb = np.clip(rgb*gain, 0, 255)

          # alpha cleanup (no bottom fade - lap occluder handles the seam)
          a_img = Image.fromarray(a.astype(np.uint8)).filter(ImageFilter.MinFilter(3)).filter(ImageFilter.GaussianBlur(0.6))
          a = np.asarray(a_img).astype(np.float32)
          cut2 = Image.fromarray(np.dstack([rgb, a[...,None]]).astype(np.uint8), "RGBA")
          cut_s = cut2.resize((sw, sh), Image.LANCZOS)

          canvas = key.convert("RGBA")
          canvas.paste(cut_s, (paste_left, paste_top), cut_s)

          # lap occluder: the set's lap/legs strip drawn OVER her lower edge
          LAP0 = max(870, WY - 60)
          RAMP = 50
          lap = key.crop((0, LAP0, W, H)).convert("RGBA")
          la = np.full((H-LAP0, W), 255, np.float32)
          la[:RAMP] = np.linspace(0,255,RAMP)[:,None]
          lap.putalpha(Image.fromarray(la.astype(np.uint8)))
          canvas.alpha_composite(lap, (0, LAP0))
          out = np.asarray(canvas.convert("RGB")).astype(np.float32)
          out = np.clip(out + np.random.normal(0, 2.2, out.shape), 0, 255).astype(np.uint8)
          import os; os.makedirs("deliverables", exist_ok=True)
          Image.fromarray(out).save("deliverables/proof_v3.jpg", quality=92)
          with open("deliverables/proof_v3_params.txt","w") as f:
              f.write(f"PS={PS:.4f}\nCX={CX}\nWY={WY}\npaste_top={paste_top}\nkey_head=({kt},{kw},{kcx})\nsrc_head=({st},{sw_},{scx})\n")
          PY

      - name: Commit proof
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deliverables/proof_v3.jpg deliverables/proof_v3_params.txt
          git commit -m "Proof frame v3: machine-measured fit on Higgsfield set"
          for n in 1 2 3 4; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break || sleep $((2**n))
          done
