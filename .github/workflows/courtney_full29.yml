name: Courtney FULL 29min New Set

# PARALLEL FINAL: 10 runners matte chunks of 0717.mp4 simultaneously onto the
# chosen set (image 3, emptied), then assemble + exact monologue + publish.

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  ZIP_URL: "https://drive.usercontent.google.com/download?id=1y2Q8zy9HWmMF7bmKZYe96ioQ5QirXU7o&export=download&confirm=t"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      total: ${{ steps.mk.outputs.total }}
    steps:
      - name: Probe source duration
        id: mk
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg unzip
          curl -L --fail --retry 5 --retry-delay 5 "$ZIP_URL" -o source.bin
          mkdir -p src && (unzip -o source.bin -d src || cp source.bin src/full29.mp4)
          VID=$(find src -type f \( -iname '*.mp4' -o -iname '*.mov' -o -iname '*.webm' -o -iname '*.mkv' \) | head -1)
          D=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VID")
          python3 - "$D" <<'PY'
          import sys, json, math, os
          D = float(sys.argv[1]); N = 20; FPS = 30
          total = int(round(D*FPS))
          chunks = []
          for i in range(N):
              ss = D*i/N
              t = D/N if i < N-1 else D - ss
              chunks.append({"i": i, "ss": round(ss,3), "t": round(t,3), "sf": int(round(ss*FPS))})
          out = open(os.environ["GITHUB_OUTPUT"], "a")
          print("matrix=" + json.dumps({"include": chunks}), file=out)
          print("total=" + str(total), file=out)
          PY

  render:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: true
      max-parallel: 20
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg unzip python3-pip
          pip3 install --quiet "rembg[cpu]" onnxruntime pillow numpy

      - name: Get source + plate
        run: |
          set -e
          mkdir -p work out qc
          cp assets/newset_plate.jpg work/plate.jpg
          curl -L --fail --retry 5 --retry-delay 5 "$ZIP_URL" -o source.bin
          mkdir -p src && (unzip -o source.bin -d src || cp source.bin src/full29.mp4)
          VID=$(find src -type f \( -iname '*.mp4' -o -iname '*.mov' -o -iname '*.webm' -o -iname '*.mkv' \) | head -1)
          echo "VIDEO=$VID" >> $GITHUB_ENV
          ffmpeg -y -i work/plate.jpg -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,gblur=sigma=1.1,noise=alls=5:allf=t" -frames:v 1 work/bg.png
          ffmpeg -y -i assets/wide_plate.jpg -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,gblur=sigma=1.1,noise=alls=5:allf=t" -frames:v 1 work/bg_wide.png

      - name: Matte + composite chunk ${{ matrix.i }}
        run: |
          set -e
          cat > stream.py <<'PY'
          import os, subprocess
          import numpy as np
          from rembg import remove, new_session
          from PIL import Image, ImageFilter
          OW, OH, FPS = 1920, 1080, 30
          VIDEO = os.environ["VIDEO"]
          SS = float(os.environ["CH_SS"]); T = float(os.environ["CH_T"])
          SF = int(os.environ["CH_SF"]); TOTAL = int(os.environ["CH_TOTAL"])
          sess = new_session("u2net_human_seg")
          bg = Image.open("work/bg.png").convert("RGBA")
          bg_wide = Image.open("work/bg_wide.png").convert("RGBA")
          SCENE_SPLIT = 600  # first 20s = wide opening
          import numpy as _np
          _lip = bg.convert("RGB").crop((640, 918, 1280, 1080))
          _lr = _np.clip((_np.arange(162)[:,None])*5, 0, 255).astype(_np.uint8)
          _lipmask = Image.fromarray(_np.repeat(_lr, 640, axis=1), "L")
          _edge = _np.full((1080,1920), 255, _np.float32)
          _ramp = _np.linspace(0,255,70)
          _edge[:, :70] = _np.minimum(_edge[:, :70], _ramp[None,:])
          _edge[:, -70:] = _np.minimum(_edge[:, -70:], _ramp[::-1][None,:])
          _edge[:70, :] = _np.minimum(_edge[:70, :], _ramp[:,None])
          bg_np = np.asarray(bg.convert("RGB")).astype(np.float32)
          set_mean = bg_np.reshape(-1,3).mean(0) + 1e-6
          dec = subprocess.Popen(
              ["ffmpeg","-ss",str(SS),"-t",str(T),"-i",VIDEO,
               "-vf",f"scale={OW}:{OH}:flags=lanczos","-r",str(FPS),
               "-f","rawvideo","-pix_fmt","rgb24","-"],
              stdout=subprocess.PIPE, stderr=subprocess.DEVNULL)
          enc = subprocess.Popen(
              ["ffmpeg","-y","-f","rawvideo","-pix_fmt","rgb24","-s",f"{OW}x{OH}","-r",str(FPS),"-i","-",
               "-c:v","libx264","-preset","medium","-crf","16","-pix_fmt","yuv420p",
               "out/chunk.mp4"],
              stdin=subprocess.PIPE, stderr=subprocess.DEVNULL)
          qc_at = {int(TOTAL*p) for p in (0.02,0.25,0.5,0.75,0.98)}
          fsize = OW*OH*3
          prev_alpha = None
          i = 0
          while True:
              raw = dec.stdout.read(fsize)
              if len(raw) < fsize: break
              g = SF + i  # global frame index
              frame = Image.frombytes("RGB",(OW,OH),raw).convert("RGBA")
              cut = remove(frame, session=sess)
              arr = np.asarray(cut).astype(np.float32)
              rgb, alpha = arr[...,:3], arr[...,3]
              m = alpha > 8
              if m.any():
                  fg_mean = rgb[m].mean(0) + 1e-6
                  gain = 1.0 + (set_mean/fg_mean - 1.0)*0.6
                  gain = np.clip(gain, 0.90, 1.12)
                  rgb = np.clip(rgb*gain, 0, 255)
              if prev_alpha is not None:
                  alpha = 0.7*alpha + 0.3*prev_alpha
              prev_alpha = alpha
              a_img = Image.fromarray(alpha.astype(np.uint8),"L").filter(ImageFilter.MinFilter(3)).filter(ImageFilter.GaussianBlur(0.7))
              cut = Image.fromarray(np.dstack([rgb, np.asarray(a_img)[...,None].astype(np.float32)]).astype(np.uint8),"RGBA")
              # mid-room: scale her down, fade her source borders, seat-anchor
              r2,g2,b2,a2 = cut.split()
              a2 = Image.fromarray(_np.minimum(_np.asarray(a2), _edge).astype(_np.uint8), "L")
              cut = Image.merge("RGBA", (r2,g2,b2,a2))
              if g < SCENE_SPLIT:
                  PS, CX, WY, BGSEL = 0.148, 982, 575, bg_wide
              else:
                  PS, CX, WY, BGSEL = 0.57, 975, 790, bg
              sw, sh = int(OW*PS), int(OH*PS)
              cut_s = cut.resize((sw, sh), Image.LANCZOS)
              canvas = Image.new("RGBA",(OW,OH),(0,0,0,0))
              canvas.paste(cut_s, (CX - sw//2, WY - sh), cut_s)
              a_small = canvas.split()[3]
              sa = a_small.filter(ImageFilter.GaussianBlur(22)).point(lambda v: int(v*0.2))
              shadow = Image.new("RGBA",(OW,OH),(0,0,0,0)); shadow.putalpha(sa)
              comp = Image.alpha_composite(BGSEL.copy(), shadow)
              comp = Image.alpha_composite(comp, canvas).convert("RGB")
              z = 1.0 + 0.05*min(g/max(TOTAL,1), 1.0)
              zw, zh = int(OW*z), int(OH*z)
              comp = comp.resize((zw, zh), Image.LANCZOS)
              x0, y0 = (zw-OW)//2, (zh-OH)//2
              comp = comp.crop((x0, y0, x0+OW, y0+OH))
              ar = np.asarray(comp).astype(np.float32)
              ar += np.random.normal(0, 2.2, ar.shape)
              comp = Image.fromarray(np.clip(ar,0,255).astype(np.uint8))
              if g in qc_at:
                  comp.save(f"qc/qc_{g:06d}.png")
              enc.stdin.write(comp.tobytes())
              i += 1
              if i % 300 == 0: print("chunk frames", i, flush=True)
          enc.stdin.close(); enc.wait(); dec.wait()
          print("CHUNK FRAMES", i, flush=True)
          PY
          python3 stream.py
        env:
          CH_SS: ${{ matrix.ss }}
          CH_T: ${{ matrix.t }}
          CH_SF: ${{ matrix.sf }}
          CH_TOTAL: ${{ needs.setup.outputs.total }}

      - name: Upload chunk
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.i }}
          path: |
            out/chunk.mp4
            qc/*.png
          if-no-files-found: error

  assemble:
    needs: [setup, render]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg unzip

      - name: Download chunks
        uses: actions/download-artifact@v4
        with:
          path: chunks

      - name: Concat + exact monologue audio
        run: |
          set -e
          mkdir -p out deliverables/qc
          for i in $(seq 0 19); do
            echo "file '$PWD/chunks/chunk-$i/out/chunk.mp4'" >> list.txt
            cp chunks/chunk-$i/qc/*.png deliverables/qc/ 2>/dev/null || true
          done
          cat list.txt
          ffmpeg -y -f concat -safe 0 -i list.txt -c copy out/video_noaudio.mp4
          curl -L --fail --retry 5 --retry-delay 5 "$ZIP_URL" -o source.bin
          mkdir -p src && (unzip -o source.bin -d src || cp source.bin src/full29.mp4)
          VID=$(find src -type f \( -iname '*.mp4' -o -iname '*.mov' -o -iname '*.webm' -o -iname '*.mkv' \) | head -1)
          ffmpeg -y -i "$VID" -vn -c:a aac -b:a 256k work_audio.m4a
          ffmpeg -y -i out/video_noaudio.mp4 -i work_audio.m4a \
            -c:v copy -c:a aac -b:a 256k -shortest out/Courtney_FULL29_NEWSET.mp4
          ffprobe -v error -show_entries format=duration,size -of default=noprint_wrappers=1 out/Courtney_FULL29_NEWSET.mp4

      - name: Add FINAL card to landing page
        run: |
          python3 - <<'PY'
          html = open('index.html').read()
          if 'Courtney_FULL29_NEWSET' not in html:
              url = "https://media.githubusercontent.com/media/gitteromri-ux/lla-s09-s10-downloads/main/deliverables/Courtney_FULL29_NEWSET.mp4"
              sec = ('\n<h2>&#9733; FULL FILM &middot; Courtney &middot; NEW SET (29 min)</h2>\n'
                     '<p class="sec-note">Courtney planted in the new set &middot; original monologue audio &middot; 1920&times;1080 &middot; final master</p>\n'
                     '<div class="grid">\n<div class="card"><h3>Courtney &middot; New Set &middot; FULL 29min</h3><div class="meta">FINAL &middot; 1080p</div>\n'
                     f'<video src="{url}" autoplay muted loop playsinline controls preload="metadata"></video>\n'
                     f'<div class="btn-row"><a class="btn" href="{url}" download>&#11015; Download FINAL</a></div></div>\n</div>\n')
              i = html.find('class="lede"')
              j = html.find('</p>', i) + 4
              open('index.html','w').write(html[:j] + sec + html[j:])
              print("index.html updated")
          PY

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: Courtney_FULL29_NEWSET
          path: |
            out/Courtney_FULL29_NEWSET.mp4
            deliverables/qc/*.png
          if-no-files-found: error

      - name: Commit deliverable + page + QC
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git lfs track "*.mp4" || true
          cp out/Courtney_FULL29_NEWSET.mp4 deliverables/
          git add .gitattributes index.html deliverables/Courtney_FULL29_NEWSET.mp4 deliverables/qc/*.png
          git commit -m "FULL29: Courtney on new set, parallel render" || echo "nothing to commit"
          for n in 1 2 3 4; do git pull --rebase origin main && git push origin HEAD:main && break || sleep $((2**n)); done
