name: Cut intro/outro segments for review

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cut:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Cut
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg git-lfs
          M="https://media.githubusercontent.com/media/${{ github.repository }}/main"
          curl -sS -L --fail --retry 4 "$M/deliverables/Courtney_MASTERCLASS_BRAND.mp4" -o brand.mp4
          curl -sS -L --fail --retry 4 "$M/deliverables/fetched/asset_2.mp4" -o outro_src.mp4
          curl -sS -L --fail --retry 4 "$M/deliverables/fetched/asset_3.mp4" -o intro_src.mp4
          D=$(ffprobe -v error -show_entries format=duration -of csv=p=0 brand.mp4)
          ID=$(ffprobe -v error -show_entries format=duration -of csv=p=0 intro_src.mp4)
          OD=$(ffprobe -v error -show_entries format=duration -of csv=p=0 outro_src.mp4)
          # intro = patched opener (Est.2000 removed, blue eTeacher logo)
          ffmpeg -y -loglevel error -t "$ID" -i brand.mp4 -c:v libx264 -crf 16 -preset fast \
            -pix_fmt yuv420p -c:a aac -b:a 256k -movflags +faststart SEG_INTRO_BRANDED.mp4
          # outro = OTRO-1 with its music + fast cut to Trustpilot/ENROLL end card
          SS=$(awk "BEGIN{print $D-$OD-4.5}")
          ffmpeg -y -loglevel error -ss "$SS" -i brand.mp4 -c:v libx264 -crf 16 -preset fast \
            -pix_fmt yuv420p -c:a aac -b:a 256k -movflags +faststart SEG_OUTRO_ENDCARD_BRANDED.mp4
          ffprobe -v error -show_entries format=duration -of csv=p=0 SEG_INTRO_BRANDED.mp4
          ffprobe -v error -show_entries format=duration -of csv=p=0 SEG_OUTRO_ENDCARD_BRANDED.mp4
      - name: Commit
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git lfs install
          git lfs track "*.mp4" || true
          mkdir -p deliverables/segments
          cp SEG_*.mp4 deliverables/segments/
          git add .gitattributes deliverables/segments
          git commit -m "Review segments: branded intro + outro/end card in full"
          for n in 1 2 3 4; do git pull --rebase origin main && git push origin HEAD:main && break || (sleep $((2**n))); done
