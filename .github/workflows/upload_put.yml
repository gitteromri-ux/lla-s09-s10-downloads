name: PUT repo file to presigned URL

on:
  workflow_dispatch:
    inputs:
      path:
        description: "Repo file path (LFS ok)"
        required: true
      content_type:
        description: "Content-Type header"
        required: true
        default: "video/mp4"
      put_url:
        description: "Presigned PUT URL (short-lived)"
        required: true

permissions:
  contents: read

jobs:
  put:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fetch single file + PUT
        env:
          IN_URL: ${{ github.event.inputs.put_url }}
          FPATH: ${{ github.event.inputs.path }}
        run: |
          set -e
          curl -sS -L --fail \
            "https://media.githubusercontent.com/media/${{ github.repository }}/main/${FPATH}" -o payload.bin
          file payload.bin; ls -la payload.bin
          curl -sS --fail -X PUT -H "Content-Type: ${{ github.event.inputs.content_type }}" \
            --data-binary "@payload.bin" "$IN_URL" -w "HTTP %{http_code}\n"
          echo "UPLOAD DONE"
